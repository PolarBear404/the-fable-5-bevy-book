[book]
title = "The Bevy Book"
description = "系统性的 Bevy 游戏引擎中文教程"
language = "zh-CN"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"

[output.html.fold]
enable = true
level = 1

# 本书代码依赖 bevy，Rust Playground 沙箱不支持，run 按钮必然失败，故全局关闭
[output.html.playground]
runnable = false
