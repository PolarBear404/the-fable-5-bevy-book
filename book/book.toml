[book]
title = "The Fable 5 Bevy Book"
description = "系统性的 Bevy 游戏引擎中文教程"
language = "zh-CN"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
# 内嵌交互 demo（如 ch23 的 WebAssembly 木偶）的样式与懒加载脚本
additional-css = ["theme/demo.css"]
additional-js = ["theme/demo.js"]

[output.html.fold]
enable = true
level = 1

# 本书代码依赖 bevy，Rust Playground 沙箱不支持，run 按钮必然失败，故全局关闭
[output.html.playground]
runnable = false
