<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>点选拖拽舞台 · 第 25 章 Picking 演示</title>
<style>
  html, body { height: 100%; margin: 0; background: #090d12; overflow: hidden; }
  #bevy-ch25 { display: block; width: 100%; height: 100%; }
  #loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: .4em;
    color: #dde7f5; font: 15px/1.7 system-ui, "Segoe UI", sans-serif; text-align: center;
  }
  #loading small { color: #91a0b2; }
</style>
</head>
<body>
  <div id="loading">
    正在加载点选拖拽舞台……
    <small>左键点选/拖拽；右键拖动视角；WASD/QE 移动</small>
  </div>
  <canvas id="bevy-ch25"></canvas>
  <script type="module">
    window.addEventListener("contextmenu", (event) => event.preventDefault());
    import init from "./ch25_stage.js";
    init()
      .then(() => document.getElementById("loading")?.remove())
      .catch((e) => {
        const el = document.getElementById("loading");
        if (el) el.innerHTML = "demo 加载失败，请刷新或回看正文截图。";
        console.error(e);
      });
  </script>
</body>
</html>
