<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>材质球画廊 · 第 24 章 PBR 材质演示</title>
<style>
  html, body { height: 100%; margin: 0; background: #0d0f14; overflow: hidden; }
  /* Bevy 的 fit_canvas_to_parent 会把画布尺寸贴合父元素，这里让父元素铺满 iframe */
  #bevy-ch24 { display: block; width: 100%; height: 100%; }
  #loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: .4em;
    color: #d8d2c8; font: 15px/1.7 system-ui, "Segoe UI", sans-serif; text-align: center;
  }
  #loading small { color: #8f897e; }
</style>
</head>
<body>
  <div id="loading">
    正在加载材质球画廊……
    <small>首次需下载几 MB，请稍候；按画面给车漆球拨清漆</small>
  </div>
  <canvas id="bevy-ch24"></canvas>
  <script type="module">
    // wasm-bindgen --target web 生成的 ES module：默认导出 init()，调用即运行 demo 的 main()。
    // 文件名与 build_ch24_wasm.py 的 OUT_NAME 对应。
    import init from "./ch24_gallery.js";
    init()
      .then(() => document.getElementById("loading")?.remove())
      .catch((e) => {
        const el = document.getElementById("loading");
        if (el) el.innerHTML = "demo 加载失败，请刷新或回看正文截图。";
        console.error(e);
      });
  </script>
</body>
</html>
