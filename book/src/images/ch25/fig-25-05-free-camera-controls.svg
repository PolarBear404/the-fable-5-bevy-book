<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">FreeCamera controls</title>
  <desc id="desc">FreeCamera combines mouse look, six-axis keyboard movement, run speed, and scroll speed adjustment.</desc>
  <defs>
    <style>
      .bg { fill: #f7f5f0; }
      .card { fill: #ffffff; stroke: #9a9488; stroke-width: 2; }
      .key { fill: #eef2ff; stroke: #68769a; stroke-width: 2; }
      .mouse { fill: #dcfce7; stroke: #4d7c55; stroke-width: 2; }
      .text { font: 18px system-ui, "Segoe UI", sans-serif; fill: #24272c; }
      .small { font: 14px system-ui, "Segoe UI", sans-serif; fill: #59616d; }
      .line { stroke: #6b7280; stroke-width: 2; fill: none; }
    </style>
  </defs>
  <rect class="bg" x="18" y="18" width="924" height="324" rx="18"/>
  <rect class="card" x="70" y="70" width="270" height="220" rx="14"/>
  <text class="text" x="205" y="110" text-anchor="middle">translation</text>
  <rect class="key" x="170" y="132" width="70" height="46" rx="8"/>
  <text class="text" x="205" y="162" text-anchor="middle">W</text>
  <rect class="key" x="94" y="184" width="70" height="46" rx="8"/>
  <text class="text" x="129" y="214" text-anchor="middle">A</text>
  <rect class="key" x="170" y="184" width="70" height="46" rx="8"/>
  <text class="text" x="205" y="214" text-anchor="middle">S</text>
  <rect class="key" x="246" y="184" width="70" height="46" rx="8"/>
  <text class="text" x="281" y="214" text-anchor="middle">D</text>
  <text class="small" x="205" y="260" text-anchor="middle">Q / E move down / up</text>

  <rect class="card" x="390" y="70" width="210" height="220" rx="14"/>
  <text class="text" x="495" y="110" text-anchor="middle">look</text>
  <rect class="mouse" x="445" y="132" width="100" height="122" rx="44"/>
  <path class="line" d="M495 132 L495 180"/>
  <circle cx="495" cy="210" r="9" fill="#4d7c55"/>
  <text class="small" x="495" y="282" text-anchor="middle">hold right mouse</text>

  <rect class="card" x="650" y="70" width="240" height="220" rx="14"/>
  <text class="text" x="770" y="110" text-anchor="middle">speed</text>
  <rect class="key" x="692" y="142" width="80" height="46" rx="8"/>
  <text class="text" x="732" y="172" text-anchor="middle">Shift</text>
  <text class="small" x="807" y="171">run speed</text>
  <path class="line" d="M704 226 C728 205, 759 205, 783 226 S839 247, 862 226"/>
  <text class="small" x="770" y="270" text-anchor="middle">scroll changes multiplier</text>
</svg>
