<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Pickable blocking rules</title>
  <desc id="desc">A UI layer can block lower mesh hits unless Pickable allows lower entities to receive hover.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4a5565"/>
    </marker>
    <style>
      .bg { fill: #f7f5f0; }
      .panel { fill: #ffffff; stroke: #9a9488; stroke-width: 2; }
      .ui { fill: #e0f2fe; stroke: #43799c; stroke-width: 2; }
      .mesh { fill: #fee2e2; stroke: #a75a5a; stroke-width: 2; }
      .hit { fill: #fde68a; stroke: #a16207; stroke-width: 2; }
      .text { font: 18px system-ui, "Segoe UI", sans-serif; fill: #24272c; }
      .small { font: 14px system-ui, "Segoe UI", sans-serif; fill: #59616d; }
      .arrow { stroke: #4a5565; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="18" y="18" width="924" height="384" rx="18"/>
  <rect class="panel" x="70" y="74" width="370" height="270" rx="12"/>
  <text class="text" x="255" y="112" text-anchor="middle">default: blocks lower</text>
  <rect class="mesh" x="178" y="225" width="154" height="72" rx="8"/>
  <text class="small" x="255" y="268" text-anchor="middle">Mesh target</text>
  <rect class="ui" x="132" y="150" width="246" height="74" rx="10"/>
  <text class="small" x="255" y="193" text-anchor="middle">UI panel</text>
  <circle class="hit" cx="255" cy="150" r="16"/>
  <path class="arrow" d="M255 56 L255 132"/>
  <text class="small" x="255" y="324" text-anchor="middle">pointer stops at the top hit</text>

  <rect class="panel" x="520" y="74" width="370" height="270" rx="12"/>
  <text class="text" x="705" y="112" text-anchor="middle">should_block_lower = false</text>
  <rect class="mesh" x="628" y="225" width="154" height="72" rx="8"/>
  <text class="small" x="705" y="268" text-anchor="middle">Mesh target</text>
  <rect class="ui" x="582" y="150" width="246" height="74" rx="10" opacity="0.76"/>
  <text class="small" x="705" y="193" text-anchor="middle">UI panel</text>
  <circle class="hit" cx="705" cy="150" r="16"/>
  <circle class="hit" cx="705" cy="225" r="12"/>
  <path class="arrow" d="M705 56 L705 132"/>
  <path class="arrow" d="M705 166 L705 214"/>
  <text class="small" x="705" y="324" text-anchor="middle">both layers can receive hover</text>
</svg>
