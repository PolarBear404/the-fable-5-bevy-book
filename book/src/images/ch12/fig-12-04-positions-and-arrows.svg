<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-o2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#c05a2e"/>
    </marker>
    <marker id="arrow-p" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L7,4 L0,8 z" fill="#7a4fb3"/>
    </marker>
  </defs>

  <!-- 卡片底 -->
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#f7f5f0"/>

  <text x="380" y="40" text-anchor="middle" font-size="14.5" fill="#5a5650">老盖的图纸：同一个 Vec2，点下去是位置，相减出来是箭头</text>

  <!-- 淡格线（每 90 单位一格，s = 0.9 px/单位） -->
  <g stroke="#e9e5dc" stroke-width="1">
    <line x1="191" y1="90" x2="191" y2="350"/>
    <line x1="272" y1="90" x2="272" y2="350"/>
    <line x1="353" y1="90" x2="353" y2="350"/>
    <line x1="434" y1="90" x2="434" y2="350"/>
    <line x1="515" y1="90" x2="515" y2="350"/>
    <line x1="596" y1="90" x2="596" y2="350"/>
    <line x1="140" y1="130" x2="640" y2="130"/>
    <line x1="140" y1="211" x2="640" y2="211"/>
  </g>
  <line x1="140" y1="292" x2="640" y2="292" stroke="#d8d2c4" stroke-width="1.5"/>
  <line x1="353" y1="90" x2="353" y2="350" stroke="#d8d2c4" stroke-width="1.5"/>

  <!-- 彗星与地球之间：纯距离（无方向，不带箭头） -->
  <line x1="245" y1="148" x2="515" y2="292" stroke="#8a8378" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="400" y="208" font-size="13" fill="#8a8378">comet.distance(earth) = 340</text>

  <!-- 位置相减得箭头：sun → comet -->
  <line x1="353" y1="292" x2="252" y2="157" stroke="#c05a2e" stroke-width="3" marker-end="url(#arrow-o2)"/>
  <text x="288" y="218" text-anchor="end" font-size="13" fill="#c05a2e" font-weight="bold">comet − sun</text>
  <text x="288" y="236" text-anchor="end" font-size="13" fill="#c05a2e">length() = 200</text>

  <!-- 三个天体（位置 = 图纸上的点） -->
  <circle cx="353" cy="292" r="7" fill="#d9a521"/>
  <text x="353" y="316" text-anchor="middle" font-size="13.5" fill="#5a5650">太阳 (0, 0)</text>
  <circle cx="515" cy="292" r="6" fill="#3b6ed9"/>
  <text x="515" y="316" text-anchor="middle" font-size="13.5" fill="#5a5650">地球 (180, 0)</text>
  <circle cx="245" cy="148" r="6" fill="#4d7d8f"/>
  <text x="245" y="132" text-anchor="middle" font-size="13.5" fill="#5a5650">彗星 (−120, 160)</text>

  <!-- lerp 取中点 -->
  <circle cx="434" cy="292" r="4" fill="none" stroke="#c05a2e" stroke-width="2"/>
  <text x="434" y="338" text-anchor="middle" font-size="12.5" fill="#8a8378">sun.lerp(earth, 0.5) = (90, 0)</text>

  <!-- 归一化图例 -->
  <rect x="540" y="316" width="204" height="92" rx="8" fill="#f0ece3" stroke="#d8d2c4"/>
  <line x1="582" y1="396" x2="552" y2="350" stroke="#7a4fb3" stroke-width="2.5" marker-end="url(#arrow-p)"/>
  <text x="590" y="346" font-size="12.5" fill="#7a4fb3" font-weight="bold">normalize() 之后</text>
  <text x="590" y="366" font-size="12.5" fill="#5a5650">方向照旧 (−0.6, 0.8)</text>
  <text x="590" y="384" font-size="12.5" fill="#5a5650">长度压成 1，只剩方向</text>
</svg>
