<svg viewBox="0 0 760 410" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#3b6ed9"/>
    </marker>
    <marker id="arrow-o" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#c05a2e"/>
    </marker>
    <marker id="arrow-g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#8a8378"/>
    </marker>
  </defs>

  <!-- 卡片底 -->
  <rect x="0" y="0" width="760" height="410" rx="10" fill="#f7f5f0"/>

  <!-- ============ 左：正对屏幕 ============ -->
  <text x="190" y="58" text-anchor="middle" font-size="15" fill="#5a5650">正对屏幕看</text>
  <rect x="50" y="80" width="280" height="230" rx="4" fill="#241e18" stroke="#8a8378" stroke-width="1.5"/>

  <!-- 三轴：+X 右、+Y 上、+Z 出屏（圆点记号 = 箭头朝你飞来） -->
  <line x1="190" y1="195" x2="300" y2="195" stroke="#3b6ed9" stroke-width="3" marker-end="url(#arrow-b)"/>
  <text x="296" y="216" font-size="14" fill="#3b6ed9" font-weight="bold">+X</text>
  <line x1="190" y1="195" x2="190" y2="100" stroke="#3b6ed9" stroke-width="3" marker-end="url(#arrow-b)"/>
  <text x="200" y="102" font-size="14" fill="#3b6ed9" font-weight="bold">+Y</text>
  <circle cx="190" cy="195" r="10" fill="none" stroke="#3b6ed9" stroke-width="2.5"/>
  <circle cx="190" cy="195" r="3" fill="#3b6ed9"/>
  <text x="178" y="240" font-size="14" fill="#3b6ed9" font-weight="bold">+Z</text>
  <text x="190" y="262" font-size="13" fill="#9aa7c8">指向屏幕外，朝着你</text>

  <text x="190" y="345" text-anchor="middle" font-size="13.5" fill="#5a5650">右手系：食指指 +X、中指弯向 +Y，</text>
  <text x="190" y="365" text-anchor="middle" font-size="13.5" fill="#5a5650">拇指自然指向 +Z</text>

  <!-- ============ 右：侧看 z 轴 ============ -->
  <text x="560" y="58" text-anchor="middle" font-size="15" fill="#5a5650">从侧面看 2D 世界（z 轴横躺）</text>

  <!-- z 轴 -->
  <line x1="405" y1="290" x2="715" y2="290" stroke="#8a8378" stroke-width="2" marker-end="url(#arrow-g)"/>
  <text x="722" y="295" font-size="14" fill="#8a8378" font-weight="bold">+Z</text>

  <!-- 三块图层（Sprite 的侧棱） -->
  <rect x="444" y="130" width="12" height="160" rx="3" fill="#8a8378"/>
  <text x="450" y="120" text-anchor="middle" font-size="12.5" fill="#5a5650">背景 z=0</text>
  <rect x="510" y="160" width="12" height="130" rx="3" fill="#3b6ed9"/>
  <text x="516" y="150" text-anchor="middle" font-size="12.5" fill="#3b6ed9">角色 z=1</text>
  <rect x="576" y="190" width="12" height="100" rx="3" fill="#c05a2e"/>
  <text x="582" y="180" text-anchor="middle" font-size="12.5" fill="#c05a2e">特效 z=2</text>

  <!-- 2D 相机：站在 z 的高处，镜头朝 −Z -->
  <rect x="655" y="178" width="42" height="30" rx="4" fill="#241e18"/>
  <path d="M655,184 L635,193 L655,202 z" fill="#241e18"/>
  <text x="668" y="166" text-anchor="middle" font-size="12.5" fill="#5a5650">2D 相机</text>
  <line x1="628" y1="226" x2="508" y2="226" stroke="#c05a2e" stroke-width="3" marker-end="url(#arrow-o)"/>
  <text x="600" y="256" font-size="13.5" fill="#c05a2e" font-weight="bold">前方 = −Z</text>

  <text x="560" y="330" text-anchor="middle" font-size="13.5" fill="#5a5650">z 大的 Sprite 离相机近，画在前面</text>
  <text x="560" y="352" text-anchor="middle" font-size="12.5" fill="#8a8378">（默认 2D 相机只看见 −1000 &lt; z &lt; +1000）</text>
</svg>
