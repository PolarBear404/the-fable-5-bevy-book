<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="900" height="420" rx="16" fill="#f7f5f0"/>
  <defs>
    <marker id="cc-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c8772e"/>
    </marker>
    <marker id="cc-white" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e8a13a"/>
    </marker>
    <radialGradient id="cc-ballA" cx="40%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#7c88c8"/>
      <stop offset="55%" stop-color="#2f3d72"/>
      <stop offset="100%" stop-color="#161d3a"/>
    </radialGradient>
  </defs>

  <text x="450" y="42" text-anchor="middle" font-size="21" font-weight="700" fill="#2c2c2c">清漆：主材质之上，再罩一层薄而亮的透明漆</text>

  <line x1="470" y1="80" x2="470" y2="392" stroke="#d9d4c8" stroke-width="2"/>

  <!-- 左：剖面 -->
  <text x="235" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#3b7a9e">剖面：光分两路反</text>
  <!-- 主材质层 -->
  <rect x="70" y="262" width="330" height="74" rx="3" fill="#2f3d72" stroke="#1c2447"/>
  <text x="235" y="306" text-anchor="middle" font-size="13.5" fill="#dfe4f5">主材质层：base / metallic / roughness 照旧</text>
  <!-- 清漆层 -->
  <rect x="70" y="238" width="330" height="24" rx="3" fill="#cfe6f0" opacity="0.75" stroke="#9bc3d6"/>
  <text x="235" y="255" text-anchor="middle" font-size="12.5" fill="#2c4654">清漆层 clearcoat：薄、透明、很光（roughness 低）</text>

  <!-- 入射光 -->
  <line x1="120" y1="120" x2="226" y2="238" stroke="#c8772e" stroke-width="2.6" marker-end="url(#cc-ar)"/>
  <text x="120" y="112" font-size="13" fill="#a23b1e">入射光</text>
  <!-- 清漆反射：锐 -->
  <line x1="226" y1="238" x2="350" y2="138" stroke="#e8a13a" stroke-width="3" marker-end="url(#cc-white)"/>
  <text x="356" y="150" font-size="13" fill="#a25a16">清漆高光：又白又锐</text>
  <!-- 主层反射：散 -->
  <g stroke="#8a93a8" stroke-width="1.6">
    <line x1="226" y1="262" x2="300" y2="205"/>
    <line x1="226" y1="262" x2="318" y2="232"/>
    <line x1="226" y1="262" x2="322" y2="258"/>
  </g>
  <text x="300" y="294" font-size="12.5" fill="#5b6478">主层自己的反射照旧</text>

  <!-- 右：两颗球对照 -->
  <text x="685" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#a23b1e">同一抹蓝漆，拨与不拨</text>
  <!-- 无清漆 -->
  <circle cx="588" cy="232" r="68" fill="url(#cc-ballA)" stroke="#161d3a"/>
  <ellipse cx="566" cy="206" rx="20" ry="13" fill="#aab4e0" opacity="0.55"/>
  <text x="588" y="330" text-anchor="middle" font-size="13.5" fill="#444">clearcoat 0</text>
  <text x="588" y="349" text-anchor="middle" font-size="12.5" fill="#777">只有主层那点软高光</text>
  <!-- 有清漆 -->
  <circle cx="785" cy="232" r="68" fill="url(#cc-ballA)" stroke="#161d3a"/>
  <ellipse cx="763" cy="206" rx="20" ry="13" fill="#aab4e0" opacity="0.55"/>
  <circle cx="800" cy="200" r="8" fill="#fff6e6"/>
  <text x="785" y="330" text-anchor="middle" font-size="13.5" fill="#444">clearcoat 1</text>
  <text x="785" y="349" text-anchor="middle" font-size="12.5" fill="#a25a16">多出一粒又白又锐的亮点</text>

  <text x="450" y="404" text-anchor="middle" font-size="13" fill="#666">车漆、易拉罐、上了清漆的木器，都是这层薄漆的功劳</text>
</svg>
