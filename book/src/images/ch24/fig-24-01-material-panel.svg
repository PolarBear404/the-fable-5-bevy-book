<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="960" height="470" rx="16" fill="#f7f5f0"/>
  <defs>
    <marker id="mp-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c8772e"/>
    </marker>
    <radialGradient id="mp-ball" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#9fb6c8"/>
      <stop offset="55%" stop-color="#4f6b86"/>
      <stop offset="100%" stop-color="#222f3d"/>
    </radialGradient>
  </defs>

  <text x="480" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#2c2c2c">StandardMaterial：一面控制台</text>

  <!-- 左：预览球 -->
  <circle cx="175" cy="240" r="92" fill="url(#mp-ball)" stroke="#3a4a5c" stroke-width="1.5"/>
  <ellipse cx="148" cy="205" rx="26" ry="16" fill="#ffffff" opacity="0.5"/>
  <text x="175" y="362" text-anchor="middle" font-size="14" fill="#555">同一颗球</text>
  <text x="175" y="382" text-anchor="middle" font-size="14" fill="#555">拧不同旋钮 = 不同材质</text>

  <!-- 箭头：参数 → 画面 -->
  <line x1="288" y1="240" x2="352" y2="240" stroke="#c8772e" stroke-width="2.4" marker-end="url(#mp-ar)"/>

  <!-- 右：控制台面板 -->
  <rect x="360" y="78" width="560" height="356" rx="12" fill="#ece9e1" stroke="#d3cdbe"/>

  <!-- 第 21 章一排 -->
  <text x="384" y="116" font-size="15" font-weight="700" fill="#3b7a9e">第 21 章 · 已学的三根</text>
  <g font-size="13" text-anchor="middle" fill="#42566a">
    <circle cx="430" cy="158" r="24" fill="#dde7ee" stroke="#3b7a9e" stroke-width="1.6"/>
    <line x1="430" y1="158" x2="430" y2="138" stroke="#3b7a9e" stroke-width="2.4"/>
    <text x="430" y="200">固有色</text>
    <circle cx="560" cy="158" r="24" fill="#dde7ee" stroke="#3b7a9e" stroke-width="1.6"/>
    <line x1="560" y1="158" x2="577" y2="146" stroke="#3b7a9e" stroke-width="2.4"/>
    <text x="560" y="200">金属度</text>
    <circle cx="690" cy="158" r="24" fill="#dde7ee" stroke="#3b7a9e" stroke-width="1.6"/>
    <line x1="690" y1="158" x2="673" y2="170" stroke="#3b7a9e" stroke-width="2.4"/>
    <text x="690" y="200">粗糙度</text>
  </g>

  <line x1="384" y1="222" x2="896" y2="222" stroke="#d3cdbe" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- 本章六根 -->
  <text x="384" y="254" font-size="15" font-weight="700" fill="#a23b1e">本章 · 摊开其余</text>
  <g font-size="13" text-anchor="middle" fill="#3a2c22">
    <circle cx="430" cy="296" r="24" fill="#f6e3cf" stroke="#c8772e" stroke-width="1.8"/>
    <line x1="430" y1="296" x2="446" y2="284" stroke="#c8772e" stroke-width="2.6"/>
    <text x="430" y="338">自发光</text>
    <circle cx="560" cy="296" r="24" fill="#f6e3cf" stroke="#c8772e" stroke-width="1.8"/>
    <line x1="560" y1="296" x2="544" y2="284" stroke="#c8772e" stroke-width="2.6"/>
    <text x="560" y="338">法线贴图</text>
    <circle cx="690" cy="296" r="24" fill="#f6e3cf" stroke="#c8772e" stroke-width="1.8"/>
    <line x1="690" y1="296" x2="690" y2="276" stroke="#c8772e" stroke-width="2.6"/>
    <text x="690" y="338">透明</text>
    <circle cx="820" cy="296" r="24" fill="#f6e3cf" stroke="#c8772e" stroke-width="1.8"/>
    <line x1="820" y1="296" x2="836" y2="306" stroke="#c8772e" stroke-width="2.6"/>
    <text x="820" y="338">清漆</text>

    <circle cx="495" cy="378" r="24" fill="#f6e3cf" stroke="#c8772e" stroke-width="1.8"/>
    <line x1="495" y1="378" x2="479" y2="368" stroke="#c8772e" stroke-width="2.6"/>
    <text x="495" y="420">双面</text>
    <circle cx="690" cy="378" r="24" fill="#f6e3cf" stroke="#c8772e" stroke-width="1.8"/>
    <line x1="690" y1="378" x2="706" y2="368" stroke="#c8772e" stroke-width="2.6"/>
    <text x="690" y="420">深度偏移</text>
  </g>

  <text x="480" y="458" text-anchor="middle" font-size="13.5" fill="#555">参数只描述「物理性质」，画面交给光照实时算出来 —— 这就是 PBR</text>
</svg>
