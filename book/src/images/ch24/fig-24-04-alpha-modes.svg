<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 330" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="1000" height="330" rx="16" fill="#f7f5f0"/>
  <defs>
    <pattern id="holes" width="22" height="22" patternUnits="userSpaceOnUse">
      <rect width="22" height="22" fill="#e0942f"/>
      <circle cx="11" cy="11" r="6.5" fill="#737d8f"/>
    </pattern>
  </defs>

  <text x="500" y="40" text-anchor="middle" font-size="21" font-weight="700" fill="#2c2c2c">alpha_mode：同一抹半透明橙，叠在灰底上的五种算法</text>

  <!-- 五张卡，cx = 110 / 300 / 490 / 680 / 870 -->
  <g font-size="14.5" font-weight="700" text-anchor="middle" fill="#2c2c2c">
    <text x="110" y="78">Opaque（默认）</text>
    <text x="300" y="78">Mask(阈值)</text>
    <text x="490" y="78">Blend</text>
    <text x="680" y="78">Add</text>
    <text x="870" y="78">Multiply</text>
  </g>

  <!-- 每张：先一块灰底，再叠一块「结果色」的前景片 -->
  <!-- Opaque -->
  <rect x="62" y="96" width="80" height="80" fill="#737d8f"/>
  <rect x="86" y="120" width="80" height="80" fill="#ef8a26"/>
  <!-- Mask -->
  <rect x="252" y="96" width="80" height="80" fill="#737d8f"/>
  <rect x="276" y="120" width="80" height="80" fill="url(#holes)"/>
  <!-- Blend -->
  <rect x="442" y="96" width="80" height="80" fill="#737d8f"/>
  <rect x="466" y="120" width="80" height="80" fill="#b3855b"/>
  <!-- Add -->
  <rect x="632" y="96" width="80" height="80" fill="#737d8f"/>
  <rect x="656" y="120" width="80" height="80" fill="#eec5a4"/>
  <!-- Multiply -->
  <rect x="822" y="96" width="80" height="80" fill="#737d8f"/>
  <rect x="846" y="120" width="80" height="80" fill="#6d4515"/>

  <g font-size="13" text-anchor="middle" fill="#444">
    <text x="110" y="232">alpha 被无视</text>
    <text x="110" y="252">照样不透明</text>
    <text x="300" y="232">按阈值一刀切</text>
    <text x="300" y="252">非透即不透·镂空</text>
    <text x="490" y="232">前·a + 后·(1−a)</text>
    <text x="490" y="252">标准混合·玻璃</text>
    <text x="680" y="232">前 + 后</text>
    <text x="680" y="252">越加越亮·发光</text>
    <text x="870" y="232">前 × 后</text>
    <text x="870" y="252">越乘越暗·滤色</text>
  </g>

  <text x="500" y="306" text-anchor="middle" font-size="13.5" fill="#666">Mask 不用排序、最省；Blend / Add / Multiply 都要按距离排序后再混合</text>
</svg>
