<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="960" height="380" rx="16" fill="#f7f5f0"/>
  <defs>
    <marker id="cl-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c8772e"/>
    </marker>
  </defs>

  <text x="480" y="42" text-anchor="middle" font-size="21" font-weight="700" fill="#2c2c2c">正面、背面与剔除：单面的旗，背过身为什么就没了</text>

  <line x1="320" y1="78" x2="320" y2="344" stroke="#d9d4c8" stroke-width="2"/>
  <line x1="640" y1="78" x2="640" y2="344" stroke="#d9d4c8" stroke-width="2"/>

  <!-- 第 1 栏：正面朝你 -->
  <text x="160" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#2c2c2c">正面朝你</text>
  <polygon points="110,150 210,135 210,275 110,260" fill="#3f6f9e" stroke="#27486a" stroke-width="1.5"/>
  <!-- 法线朝外（朝你） -->
  <line x1="160" y1="205" x2="250" y2="205" stroke="#c8772e" stroke-width="2.6" marker-end="url(#cl-ar)"/>
  <text x="244" y="196" font-size="12.5" fill="#a23b1e">法线朝你</text>
  <text x="160" y="305" text-anchor="middle" font-size="13" fill="#444">顶点逆时针绕</text>
  <text x="160" y="325" text-anchor="middle" font-size="13" fill="#2e7d46">✓ 看得见，受光正常</text>

  <!-- 第 2 栏：背面朝你·默认 -->
  <text x="480" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#2c2c2c">背面朝你 · 默认</text>
  <polygon points="430,150 530,135 530,275 430,260" fill="none" stroke="#b9b1a0" stroke-width="1.6" stroke-dasharray="6 5"/>
  <text x="480" y="212" text-anchor="middle" font-size="30" fill="#b08a8a">✗</text>
  <text x="480" y="305" text-anchor="middle" font-size="13" fill="#444">cull_mode = Some(Face::Back)</text>
  <text x="480" y="325" text-anchor="middle" font-size="13" fill="#a23b1e">背面被剔除 → 凭空消失</text>

  <!-- 第 3 栏：背面朝你·双面 -->
  <text x="800" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#2c2c2c">背面朝你 · 双面</text>
  <polygon points="750,150 850,135 850,275 750,260" fill="#3f6f9e" stroke="#27486a" stroke-width="1.5"/>
  <!-- 法线翻正，朝你 -->
  <line x1="800" y1="205" x2="890" y2="205" stroke="#c8772e" stroke-width="2.6" marker-end="url(#cl-ar)"/>
  <text x="884" y="196" font-size="12.5" fill="#a23b1e">法线翻正</text>
  <text x="800" y="305" text-anchor="middle" font-size="13" fill="#444">double_sided + cull_mode None</text>
  <text x="800" y="325" text-anchor="middle" font-size="13" fill="#2e7d46">✓ 两面都画，受光正常</text>

  <text x="480" y="364" text-anchor="middle" font-size="13" fill="#666">double_sided 翻正背面法线（受光对）；cull_mode None 让背面也画（看得见）—— 两样都要</text>
</svg>
