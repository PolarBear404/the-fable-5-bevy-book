<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-b16" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#3b6ed9"/>
    </marker>
    <marker id="arr-o16" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#c05a2e"/>
    </marker>
  </defs>

  <!-- 卡片底 -->
  <rect x="0" y="0" width="760" height="400" rx="10" fill="#f7f5f0"/>

  <text x="380" y="34" text-anchor="middle" font-size="16" fill="#4a463f" font-weight="bold">从字符串到画面：排版一次，光栅化进图集，逐字贴四边形</text>

  <!-- 左列：三件输入 -->
  <g>
    <rect x="36" y="64" width="186" height="54" rx="6" fill="#ffffff" stroke="#8a8378" stroke-width="1.5"/>
    <text x="129" y="86" text-anchor="middle" font-size="13" fill="#4a463f">Text2d(String)</text>
    <text x="129" y="106" text-anchor="middle" font-size="13" fill="#7a7468">“夜渡无人…”</text>

    <rect x="36" y="138" width="186" height="54" rx="6" fill="#ffffff" stroke="#8a8378" stroke-width="1.5"/>
    <text x="129" y="160" text-anchor="middle" font-size="13" fill="#4a463f">Font 资产（字模）</text>
    <text x="129" y="180" text-anchor="middle" font-size="13" fill="#7a7468">矢量轮廓 ƒ</text>

    <rect x="36" y="212" width="186" height="54" rx="6" fill="#ffffff" stroke="#8a8378" stroke-width="1.5"/>
    <text x="129" y="234" text-anchor="middle" font-size="13" fill="#4a463f">TextFont.font_size: 32</text>
    <text x="129" y="254" text-anchor="middle" font-size="13" fill="#7a7468">× 窗口缩放系数</text>
  </g>

  <!-- 中列：排版与光栅化 -->
  <rect x="282" y="120" width="170" height="120" rx="8" fill="#dde6f7" stroke="#3b6ed9" stroke-width="2"/>
  <text x="367" y="160" text-anchor="middle" font-size="14" fill="#274a91" font-weight="bold">排版 + 光栅化</text>
  <text x="367" y="184" text-anchor="middle" font-size="12" fill="#4a5a7d">断行、对齐、定位</text>
  <text x="367" y="204" text-anchor="middle" font-size="12" fill="#4a5a7d">缺的字形现刻现存</text>

  <path d="M222,91 C 252,91 252,150 282,154" fill="none" stroke="#3b6ed9" stroke-width="2" marker-end="url(#arr-b16)"/>
  <path d="M222,165 L 282,177" fill="none" stroke="#3b6ed9" stroke-width="2" marker-end="url(#arr-b16)"/>
  <path d="M222,239 C 252,239 252,210 282,202" fill="none" stroke="#3b6ed9" stroke-width="2" marker-end="url(#arr-b16)"/>

  <!-- 右上：字形图集 -->
  <g>
    <rect x="520" y="64" width="200" height="120" rx="6" fill="#efe9df" stroke="#8a8378" stroke-width="2"/>
    <text x="620" y="56" text-anchor="middle" font-size="13" fill="#4a463f" font-weight="bold">字形图集（FontAtlas 纹理）</text>
    <g stroke="#c05a2e" stroke-width="1.2" fill="#f6dfd2">
      <rect x="532" y="76" width="44" height="44"/>
      <rect x="580" y="76" width="44" height="44"/>
      <rect x="628" y="76" width="44" height="44"/>
      <rect x="532" y="124" width="44" height="44"/>
      <rect x="580" y="124" width="44" height="44"/>
      <rect x="628" y="124" width="44" height="44" fill="#fff" stroke-dasharray="4 3"/>
    </g>
    <g font-size="26" fill="#4a463f">
      <text x="554" y="110" text-anchor="middle">夜</text>
      <text x="602" y="110" text-anchor="middle">渡</text>
      <text x="650" y="110" text-anchor="middle">无</text>
      <text x="554" y="158" text-anchor="middle">人</text>
      <text x="602" y="158" text-anchor="middle">，</text>
    </g>
    <text x="650" y="152" text-anchor="middle" font-size="11" fill="#a09a8e">空位</text>
    <text x="620" y="200" text-anchor="middle" font-size="12" fill="#7a7468">每种「字体 × 光栅化字号」一张</text>
  </g>

  <!-- 右下：屏幕四边形 -->
  <g>
    <rect x="520" y="244" width="200" height="110" rx="6" fill="#1d2430" stroke="#8a8378" stroke-width="2"/>
    <text x="620" y="236" text-anchor="middle" font-size="13" fill="#4a463f" font-weight="bold">屏幕：每个字一个小四边形</text>
    <g fill="#f2f4f8" font-size="30">
      <text x="556" y="312" text-anchor="middle">夜</text>
      <text x="596" y="312" text-anchor="middle">渡</text>
      <text x="636" y="312" text-anchor="middle">无</text>
      <text x="676" y="312" text-anchor="middle">人</text>
    </g>
    <g fill="none" stroke="#c05a2e" stroke-width="1" stroke-dasharray="3 3">
      <rect x="538" y="284" width="36" height="36"/>
      <rect x="578" y="284" width="36" height="36"/>
      <rect x="618" y="284" width="36" height="36"/>
      <rect x="658" y="284" width="36" height="36"/>
    </g>
  </g>

  <!-- 中 → 右上 / 右上 → 右下 -->
  <path d="M452,150 C 480,140 488,120 516,108" fill="none" stroke="#c05a2e" stroke-width="2" marker-end="url(#arr-o16)"/>
  <text x="478" y="112" font-size="12" fill="#c05a2e">现刻</text>
  <path d="M620,188 L 620,238" fill="none" stroke="#c05a2e" stroke-width="2" marker-end="url(#arr-o16)"/>
  <text x="632" y="218" font-size="12" fill="#c05a2e">取格子贴图</text>

  <!-- 底部对照注 -->
  <g font-size="13">
    <text x="36" y="316" fill="#274a91" font-weight="bold">font_size：光栅化之前生效</text>
    <text x="36" y="338" fill="#4a463f">字号越大，刻进图集的像素越多 → 锐</text>
    <text x="36" y="366" fill="#a14227" font-weight="bold">Transform::scale：光栅化之后生效</text>
    <text x="36" y="388" fill="#4a463f">拉伸已经刻好的小图 → 糊</text>
  </g>
</svg>
