<svg viewBox="0 0 780 520" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-20pm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#7a7468"/>
    </marker>
    <marker id="arr-20pm-o" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#c05a2e"/>
    </marker>
    <marker id="arr-20pm-p" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#8a6f9e"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="520" rx="10" fill="#f7f5f0"/>

  <text x="390" y="32" text-anchor="middle" font-size="16" fill="#4a463f" font-weight="bold">《打瓦》的插件版图：四摊各管各的，靠消息与资源说话</text>

  <!-- main.rs -->
  <rect x="240" y="52" width="300" height="64" rx="10" fill="#ffffff" stroke="#4a463f" stroke-width="2.2"/>
  <text x="390" y="76" text-anchor="middle" font-size="13.5" fill="#4a463f" font-weight="bold">main.rs —— 总装线</text>
  <text x="390" y="96" text-anchor="middle" font-size="10.5" fill="#7a7468">窗口 · ClearColor · 相机 · GameState/IsPaused · add_plugins</text>

  <!-- 四条装配线 -->
  <path d="M300,116 L120,160" stroke="#7a7468" stroke-width="1.6" fill="none" marker-end="url(#arr-20pm)"/>
  <path d="M360,116 L300,160" stroke="#7a7468" stroke-width="1.6" fill="none" marker-end="url(#arr-20pm)"/>
  <path d="M420,116 L482,160" stroke="#7a7468" stroke-width="1.6" fill="none" marker-end="url(#arr-20pm)"/>
  <path d="M480,116 L662,160" stroke="#7a7468" stroke-width="1.6" fill="none" marker-end="url(#arr-20pm)"/>

  <!-- game -->
  <rect x="30" y="162" width="180" height="180" rx="10" fill="#ffffff" stroke="#1d6b40" stroke-width="2.2"/>
  <text x="120" y="188" text-anchor="middle" font-size="13.5" fill="#1d6b40" font-weight="bold">game::GamePlugin</text>
  <text x="42" y="212" font-size="11" fill="#4a463f">玩法本体（鼓点上）：</text>
  <text x="42" y="230" font-size="10.5" fill="#7a7468">开台 · 推凳 · 发球 · 移动</text>
  <text x="42" y="246" font-size="10.5" fill="#7a7468">碰撞与反弹 · 沟 · 胜负</text>
  <text x="42" y="266" font-size="11" fill="#4a463f">持有：</text>
  <text x="42" y="284" font-size="10.5" fill="#1d6b40">Intent（私）· BallStock（私）</text>
  <text x="42" y="300" font-size="10.5" fill="#1d6b40">Lives（pub）· Outcome（pub）</text>
  <text x="42" y="322" font-size="10.5" fill="#c05a2e" font-weight="bold">写 Knock 消息（pub）</text>

  <!-- menu -->
  <rect x="226" y="162" width="160" height="180" rx="10" fill="#ffffff" stroke="#b8b1a4" stroke-width="2.2"/>
  <text x="306" y="188" text-anchor="middle" font-size="13.5" fill="#4a463f" font-weight="bold">menu::MenuPlugin</text>
  <text x="238" y="212" font-size="11" fill="#4a463f">画面流程：</text>
  <text x="238" y="230" font-size="10.5" fill="#7a7468">后台招牌 · 结算屏 · 中场幕布</text>
  <text x="238" y="246" font-size="10.5" fill="#7a7468">空格/Esc/P —— 状态机司机</text>
  <text x="238" y="276" font-size="10.5" fill="#7a7468">读 game::Outcome 定胜负词</text>
  <text x="238" y="292" font-size="10.5" fill="#7a7468">读 score::Score 报战果</text>

  <!-- score -->
  <rect x="402" y="162" width="160" height="180" rx="10" fill="#ffffff" stroke="#8a6f9e" stroke-width="2.2"/>
  <text x="482" y="188" text-anchor="middle" font-size="13.5" fill="#8a6f9e" font-weight="bold">score::ScorePlugin</text>
  <text x="414" y="212" font-size="11" fill="#4a463f">记账与挂牌：</text>
  <text x="414" y="230" font-size="10.5" fill="#7a7468">听 Knock 记分 · 里程碑台词</text>
  <text x="414" y="246" font-size="10.5" fill="#7a7468">记分牌 / 命数牌 Text2d</text>
  <text x="414" y="266" font-size="11" fill="#4a463f">持有：</text>
  <text x="414" y="284" font-size="10.5" fill="#8a6f9e">Score（pub）</text>
  <text x="414" y="306" font-size="10.5" fill="#7a7468">resource_changed 才重排版</text>

  <!-- audio -->
  <rect x="578" y="162" width="172" height="180" rx="10" fill="#ffffff" stroke="#c05a2e" stroke-width="2.2"/>
  <text x="664" y="188" text-anchor="middle" font-size="13.5" fill="#c05a2e" font-weight="bold">audio::SoundPlugin</text>
  <text x="590" y="212" font-size="11" fill="#4a463f">武场：</text>
  <text x="590" y="230" font-size="10.5" fill="#7a7468">听 Knock 敲家伙（DESPAWN）</text>
  <text x="590" y="246" font-size="10.5" fill="#7a7468">BGM 循环 · 胜负定音</text>
  <text x="590" y="262" font-size="10.5" fill="#7a7468">中场拧 sink · 总闸 GlobalVolume</text>
  <text x="590" y="290" font-size="11" fill="#4a463f">持有：</text>
  <text x="590" y="308" font-size="10.5" fill="#c05a2e">SoundBank（私）</text>

  <!-- 消息总线 -->
  <rect x="30" y="376" width="720" height="54" rx="8" fill="#efe9dd" stroke="#b8b1a4" stroke-width="1.5"/>
  <text x="56" y="398" font-size="12" fill="#c05a2e" font-weight="bold">Knock 消息</text>
  <text x="56" y="416" font-size="10.5" fill="#7a7468">Wall / Paddle / Crack / Shatter / Gutter——game 只管喊，score 与 audio 各自来听（第 7 章的一写多读）</text>
  <path d="M120,342 L120,376" stroke="#c05a2e" stroke-width="2" fill="none" marker-end="url(#arr-20pm-o)"/>
  <path d="M482,376 L482,342" stroke="#c05a2e" stroke-width="2" fill="none" marker-end="url(#arr-20pm-o)"/>
  <path d="M664,376 L664,342" stroke="#c05a2e" stroke-width="2" fill="none" marker-end="url(#arr-20pm-o)"/>

  <!-- 资源横向引用 -->
  <path d="M386,300 L402,300" stroke="#8a6f9e" stroke-width="1.6" fill="none" stroke-dasharray="4,3" marker-start="url(#arr-20pm-p)"/>
  <path d="M226,308 L210,308" stroke="#7a7468" stroke-width="1.6" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-20pm)"/>

  <!-- 底注 -->
  <line x1="36" y1="456" x2="744" y2="456" stroke="#b8b1a4" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="390" y="482" text-anchor="middle" font-size="12" fill="#4a463f">pub 清单就是插件间的合同：Knock、Score、Lives、Outcome 和几个场地常量——其余一概私有</text>
  <text x="390" y="502" text-anchor="middle" font-size="11" fill="#7a7468">谁也不调用谁的函数；想说话，走消息或资源</text>
</svg>
