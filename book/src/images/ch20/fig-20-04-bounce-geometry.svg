<svg viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-20bg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#7a7468"/>
    </marker>
    <marker id="arr-20bg-g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#1d6b40"/>
    </marker>
    <marker id="arr-20bg-o" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#c05a2e"/>
    </marker>
    <marker id="arr-20bg-r" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#cb4f44"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="420" rx="10" fill="#f7f5f0"/>

  <text x="390" y="34" text-anchor="middle" font-size="16" fill="#4a463f" font-weight="bold">圆撞盒三步：判交 → 判面 → 翻速度</text>

  <!-- ① 判交 -->
  <text x="140" y="70" text-anchor="middle" font-size="13" fill="#4a463f" font-weight="bold">① 相交吗</text>
  <rect x="60" y="120" width="120" height="80" rx="4" fill="#e3ded2" stroke="#8a7560" stroke-width="2"/>
  <text x="120" y="165" text-anchor="middle" font-size="11" fill="#7a7468">Aabb2d</text>
  <circle cx="208" cy="138" r="26" fill="none" stroke="#cb4f44" stroke-width="2"/>
  <circle cx="208" cy="138" r="2.6" fill="#cb4f44"/>
  <text x="208" y="106" text-anchor="middle" font-size="11" fill="#cb4f44">BoundingCircle</text>
  <path d="M186,152 L208,138" stroke="#7a7468" stroke-width="1.4" stroke-dasharray="3,3"/>
  <text x="140" y="240" text-anchor="middle" font-size="11.5" fill="#4a463f">ball.intersects(&amp;target)</text>
  <text x="140" y="259" text-anchor="middle" font-size="11" fill="#7a7468">不相交 → None，下一个</text>

  <!-- ② 判面 -->
  <text x="394" y="70" text-anchor="middle" font-size="13" fill="#4a463f" font-weight="bold">② 撞的哪一面</text>
  <rect x="310" y="120" width="120" height="80" rx="4" fill="#e3ded2" stroke="#8a7560" stroke-width="2"/>
  <circle cx="452" cy="146" r="26" fill="none" stroke="#cb4f44" stroke-width="2"/>
  <circle cx="452" cy="146" r="2.6" fill="#cb4f44"/>
  <!-- closest_point：圆心夹到盒上 -->
  <circle cx="430" cy="146" r="3.4" fill="#1d6b40"/>
  <path d="M430,146 L449,146" stroke="#1d6b40" stroke-width="2.2" marker-end="url(#arr-20bg-g)"/>
  <text x="447" y="132" text-anchor="middle" font-size="11" fill="#1d6b40" stroke="#f7f5f0" stroke-width="3.5" paint-order="stroke">offset</text>
  <text x="424" y="166" text-anchor="end" font-size="11" fill="#1d6b40">closest_point</text>
  <text x="394" y="240" text-anchor="middle" font-size="11.5" fill="#4a463f">offset = 圆心 − 盒上最近点</text>
  <text x="394" y="259" text-anchor="middle" font-size="11" fill="#7a7468">哪根轴长听哪根：|x|&gt;|y| 且为正 → Right</text>

  <!-- ③ 翻速度 -->
  <text x="648" y="70" text-anchor="middle" font-size="13" fill="#4a463f" font-weight="bold">③ 迎面才反弹</text>
  <rect x="560" y="150" width="176 " height="20" rx="3" fill="#d4a45e"/>
  <text x="648" y="186" text-anchor="middle" font-size="10.5" fill="#7a7468">Side::Top（凳面）</text>
  <!-- 来球：向下右 -->
  <path d="M580,96 L628,148" stroke="#cb4f44" stroke-width="2.2" fill="none" marker-end="url(#arr-20bg-r)"/>
  <text x="585" y="88" font-size="11" fill="#cb4f44">v = (vx, −vy)</text>
  <!-- 反弹：向上右 -->
  <path d="M632,146 L688,92" stroke="#1d6b40" stroke-width="2.2" fill="none" marker-end="url(#arr-20bg-g)"/>
  <text x="696" y="124" font-size="11" fill="#1d6b40" stroke="#f7f5f0" stroke-width="3.5" paint-order="stroke">vy 翻号</text>
  <text x="648" y="240" text-anchor="middle" font-size="11.5" fill="#4a463f">只翻被撞的那根轴</text>
  <text x="648" y="259" text-anchor="middle" font-size="11" fill="#7a7468">且仅当速度迎着撞面（防贴边抖动）</text>

  <!-- 分隔 -->
  <line x1="270" y1="64" x2="270" y2="268" stroke="#b8b1a4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="524" y1="64" x2="524" y2="268" stroke="#b8b1a4" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 底部：为什么用迎面判定 -->
  <line x1="36" y1="290" x2="744" y2="290" stroke="#b8b1a4" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="60" y="318" font-size="12.5" fill="#4a463f" font-weight="bold">为什么要“迎面才反弹”？</text>
  <rect x="60" y="334" width="120" height="56" rx="4" fill="#e3ded2" stroke="#8a7560" stroke-width="2"/>
  <circle cx="186" cy="362" r="17" fill="none" stroke="#cb4f44" stroke-width="2"/>
  <path d="M192,358 L226,338" stroke="#1d6b40" stroke-width="2" fill="none" marker-end="url(#arr-20bg-g)"/>
  <text x="262" y="346" font-size="11" fill="#7a7468">球已在脱身路上、仍与盒相交——</text>
  <text x="262" y="364" font-size="11" fill="#7a7468">若不看方向就翻号，它会被反复拍回盒里，</text>
  <text x="262" y="382" font-size="11" fill="#7a7468">贴着边面抽搐。官方 breakout 同款防抖。</text>
</svg>
