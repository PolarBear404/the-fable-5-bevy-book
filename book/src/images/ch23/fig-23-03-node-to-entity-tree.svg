<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="920" height="470" rx="16" fill="#f7f5f0"/>
  <defs>
    <marker id="nt-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c8772e"/>
    </marker>
  </defs>
  <text x="460" y="40" text-anchor="middle" font-size="21" font-weight="700" fill="#2c2c2c">glTF 的节点树，加载后展开成实体树；节点名变成 Name</text>
  <text x="150" y="82" text-anchor="middle" font-size="15" fill="#555">glTF 文件里的节点</text>
  <text x="700" y="82" text-anchor="middle" font-size="15" fill="#555">加载后展开的实体</text>

  <!-- 左树连接线 -->
  <g stroke="#c9c0b0" stroke-width="2" fill="none">
    <path d="M84 138 L84 164 L104 164"/>
    <path d="M120 178 L120 348"/>
    <path d="M120 204 L140 204"/>
    <path d="M120 240 L140 240"/>
    <path d="M120 276 L140 276"/>
    <path d="M120 312 L140 312"/>
    <path d="M120 348 L140 348"/>
  </g>
  <!-- 左树节点 -->
  <g font-size="13" fill="#3a2c1c">
    <rect x="70" y="110" width="104" height="28" rx="6" fill="#e9e2d3" stroke="#b8a07e"/><text x="122" y="129" text-anchor="middle">Puppet</text>
    <rect x="104" y="150" width="104" height="28" rx="6" fill="#e9e2d3" stroke="#b8a07e"/><text x="156" y="169" text-anchor="middle">Torso</text>
    <rect x="140" y="190" width="92" height="28" rx="6" fill="#e9e2d3" stroke="#b8a07e"/><text x="186" y="209" text-anchor="middle">Head</text>
    <rect x="140" y="226" width="92" height="28" rx="6" fill="#e9e2d3" stroke="#b8a07e"/><text x="186" y="245" text-anchor="middle">ArmLeft</text>
    <rect x="140" y="262" width="92" height="28" rx="6" fill="#e9e2d3" stroke="#b8a07e"/><text x="186" y="281" text-anchor="middle">ArmRight</text>
    <rect x="140" y="298" width="92" height="28" rx="6" fill="#e9e2d3" stroke="#b8a07e"/><text x="186" y="317" text-anchor="middle">LegLeft</text>
    <rect x="140" y="334" width="92" height="28" rx="6" fill="#e9e2d3" stroke="#b8a07e"/><text x="186" y="353" text-anchor="middle">LegRight</text>
  </g>

  <!-- 中间箭头 -->
  <line x1="430" y1="250" x2="540" y2="250" stroke="#c8772e" stroke-width="3" marker-end="url(#nt-ar)"/>
  <text x="485" y="234" text-anchor="middle" font-size="13" fill="#a23b1e">SceneRoot 展开</text>
  <text x="485" y="272" text-anchor="middle" font-size="12" fill="#666">名字→Name</text>

  <!-- 右树连接线 -->
  <g stroke="#a9c4b6" stroke-width="2" fill="none">
    <path d="M576 132 L576 160 L584 160"/>
    <path d="M600 174 L600 196 L608 196"/>
    <path d="M624 210 L624 360"/>
    <path d="M624 232 L632 232"/>
    <path d="M624 264 L632 264"/>
    <path d="M624 296 L632 296"/>
    <path d="M624 328 L632 328"/>
    <path d="M624 360 L632 360"/>
  </g>
  <!-- 右树实体 -->
  <g font-size="12.5">
    <rect x="556" y="104" width="190" height="28" rx="6" fill="#f0e2c8" stroke="#cda85c"/><text x="651" y="123" text-anchor="middle" fill="#6a5220">SceneRoot 实体（你 spawn）</text>
    <rect x="584" y="146" width="154" height="28" rx="6" fill="#d8e6df" stroke="#6f9e84"/><text x="661" y="165" text-anchor="middle" fill="#1c3a2c">Name: "Puppet"</text>
    <rect x="608" y="182" width="142" height="28" rx="6" fill="#d8e6df" stroke="#6f9e84"/><text x="679" y="201" text-anchor="middle" fill="#1c3a2c">Name: "Torso"</text>
    <rect x="632" y="218" width="150" height="28" rx="6" fill="#d8e6df" stroke="#6f9e84"/><text x="707" y="237" text-anchor="middle" fill="#1c3a2c">Name: "Head"</text>
    <rect x="632" y="250" width="150" height="28" rx="6" fill="#d8e6df" stroke="#6f9e84"/><text x="707" y="269" text-anchor="middle" fill="#1c3a2c">Name: "ArmLeft"</text>
    <rect x="632" y="282" width="150" height="28" rx="6" fill="#d8e6df" stroke="#6f9e84"/><text x="707" y="301" text-anchor="middle" fill="#1c3a2c">Name: "ArmRight"</text>
    <rect x="632" y="314" width="150" height="28" rx="6" fill="#d8e6df" stroke="#6f9e84"/><text x="707" y="333" text-anchor="middle" fill="#1c3a2c">Name: "LegLeft"</text>
    <rect x="632" y="346" width="150" height="28" rx="6" fill="#d8e6df" stroke="#6f9e84"/><text x="707" y="365" text-anchor="middle" fill="#1c3a2c">Name: "LegRight"</text>
  </g>

  <text x="460" y="452" text-anchor="middle" font-size="13" fill="#777">你 spawn 的 SceneRoot 是根；glTF 的 Puppet 成了它的子实体，整棵树挂在它名下</text>
</svg>
