<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="900" height="430" rx="16" fill="#f7f5f0"/>
  <defs>
    <marker id="gc-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c8772e"/>
    </marker>
  </defs>
  <text x="450" y="40" text-anchor="middle" font-size="21" font-weight="700" fill="#2c2c2c">一份 glTF 是一箱分门别类的货，按标签提取单件</text>

  <!-- 集装箱 -->
  <rect x="50" y="70" width="330" height="330" rx="10" fill="#fdfcf9" stroke="#b8b0a0" stroke-width="2"/>
  <rect x="50" y="70" width="330" height="30" rx="10" fill="#e7ddca" stroke="#b8b0a0" stroke-width="2"/>
  <text x="66" y="91" font-size="15" font-weight="700" fill="#5a2b1c">puppet.gltf</text>

  <!-- 五个货架 -->
  <!-- Scenes -->
  <text x="68" y="135" font-size="14" fill="#555">Scenes</text>
  <rect x="175" y="120" width="26" height="24" rx="4" fill="#cdd9e6" stroke="#8aa0b6"/>
  <text x="188" y="137" text-anchor="middle" font-size="12" fill="#33485c">0</text>
  <!-- Nodes -->
  <text x="68" y="187" font-size="14" fill="#555">Nodes</text>
  <g fill="#e6d3c4" stroke="#b58a6e">
    <rect x="175" y="172" width="26" height="24" rx="4"/>
    <rect x="205" y="172" width="26" height="24" rx="4"/>
    <rect x="235" y="172" width="26" height="24" rx="4"/>
  </g>
  <text x="188" y="189" text-anchor="middle" font-size="12" fill="#5a3b29">0</text>
  <text x="218" y="189" text-anchor="middle" font-size="12" fill="#5a3b29">1</text>
  <text x="248" y="189" text-anchor="middle" font-size="12" fill="#5a3b29">2</text>
  <text x="272" y="189" font-size="13" fill="#999">…7</text>
  <!-- Meshes -->
  <text x="68" y="239" font-size="14" fill="#555">Meshes</text>
  <g fill="#d8e3d2" stroke="#84a578">
    <rect x="175" y="224" width="26" height="24" rx="4"/>
    <rect x="205" y="224" width="26" height="24" rx="4"/>
    <rect x="235" y="224" width="26" height="24" rx="4"/>
    <rect x="265" y="224" width="26" height="24" rx="4"/>
  </g>
  <text x="188" y="241" text-anchor="middle" font-size="12" fill="#2f4a28">0</text>
  <text x="218" y="241" text-anchor="middle" font-size="12" fill="#2f4a28">1</text>
  <text x="248" y="241" text-anchor="middle" font-size="12" fill="#2f4a28">2</text>
  <text x="278" y="241" text-anchor="middle" font-size="12" fill="#2f4a28">3</text>
  <!-- Materials -->
  <text x="68" y="291" font-size="14" fill="#555">Materials</text>
  <g fill="#e7d6e0" stroke="#b288a4">
    <rect x="175" y="276" width="26" height="24" rx="4"/>
    <rect x="205" y="276" width="26" height="24" rx="4"/>
  </g>
  <text x="188" y="293" text-anchor="middle" font-size="12" fill="#5c3a51">0</text>
  <text x="218" y="293" text-anchor="middle" font-size="12" fill="#5c3a51">1</text>
  <!-- Animations -->
  <text x="68" y="343" font-size="14" fill="#555">Animations</text>
  <rect x="175" y="328" width="26" height="24" rx="4" fill="#f0dcb8" stroke="#cda85c"/>
  <text x="188" y="345" text-anchor="middle" font-size="12" fill="#6a5220">0</text>

  <!-- 标签callout -->
  <g stroke="#c8772e" stroke-width="2" marker-end="url(#gc-ar)" fill="none">
    <path d="M201 132 L470 126"/>
    <path d="M291 236 L470 232"/>
    <path d="M201 340 L470 336"/>
  </g>
  <text x="478" y="118" font-size="15" fill="#2c2c2c"><tspan font-weight="700">Scene(0)</tspan> → <tspan fill="#a23b1e">#Scene0</tspan></text>
  <text x="478" y="140" font-size="13" fill="#666">提出一张 Handle&lt;Scene&gt;，喂给 SceneRoot</text>
  <text x="478" y="224" font-size="15" fill="#2c2c2c"><tspan font-weight="700">Mesh(0)/Primitive(0)</tspan> → <tspan fill="#a23b1e">#Mesh0/Primitive0</tspan></text>
  <text x="478" y="246" font-size="13" fill="#666">网格里真正可渲染的那块</text>
  <text x="478" y="328" font-size="15" fill="#2c2c2c"><tspan font-weight="700">Animation(0)</tspan> → <tspan fill="#a23b1e">#Animation0</tspan></text>
  <text x="478" y="350" font-size="13" fill="#666">提出一张 Handle&lt;AnimationClip&gt;</text>
</svg>
