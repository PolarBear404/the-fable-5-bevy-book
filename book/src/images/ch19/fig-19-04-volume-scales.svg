<svg viewBox="0 0 760 350" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <rect x="0" y="0" width="760" height="350" rx="10" fill="#f7f5f0"/>

  <text x="380" y="36" text-anchor="middle" font-size="16" fill="#4a463f" font-weight="bold">同一根音量轴，两把尺子</text>

  <!-- 主轴 -->
  <line x1="120" y1="160" x2="690" y2="160" stroke="#b8b1a4" stroke-width="2.5"/>
  <!-- 断轴符号（-∞ 与可量程之间） -->
  <path d="M196,150 L204,170 M210,150 L218,170" stroke="#f7f5f0" stroke-width="14"/>
  <path d="M196,150 L204,170 M210,150 L218,170" stroke="#b8b1a4" stroke-width="2"/>

  <!-- 刻度 -->
  <g stroke="#4a463f" stroke-width="2">
    <line x1="140" y1="150" x2="140" y2="170"/>
    <line x1="260" y1="150" x2="260" y2="170"/>
    <line x1="365" y1="150" x2="365" y2="170"/>
    <line x1="470" y1="150" x2="470" y2="170"/>
    <line x1="575" y1="150" x2="575" y2="170"/>
    <line x1="660" y1="150" x2="660" y2="170"/>
  </g>

  <!-- Linear 行（轴上方） -->
  <text x="64" y="118" text-anchor="middle" font-size="12.5" fill="#1d6b40" font-weight="bold">Linear</text>
  <g font-size="12.5" fill="#1d6b40" text-anchor="middle">
    <text x="140" y="134">0.0</text>
    <text x="260" y="134">0.125</text>
    <text x="365" y="134">0.25</text>
    <text x="470" y="134">0.5</text>
    <text x="575" y="134" font-weight="bold">1.0</text>
    <text x="660" y="134">2.0</text>
  </g>
  <text x="64" y="136" text-anchor="middle" font-size="11" fill="#7a7468">原始振幅倍数</text>

  <!-- Decibels 行（轴下方） -->
  <text x="64" y="196" text-anchor="middle" font-size="12.5" fill="#c05a2e" font-weight="bold">Decibels</text>
  <g font-size="12.5" fill="#c05a2e" text-anchor="middle">
    <text x="140" y="192">−∞</text>
    <text x="260" y="192">−18</text>
    <text x="365" y="192">−12</text>
    <text x="470" y="192">−6</text>
    <text x="575" y="192" font-weight="bold">0</text>
    <text x="660" y="192">+6</text>
  </g>
  <text x="64" y="214" text-anchor="middle" font-size="11" fill="#7a7468">对数刻度</text>

  <!-- 标注：等距与等比 -->
  <path d="M470,212 C500,232 545,232 575,212" stroke="#c05a2e" stroke-width="1.5" fill="none"/>
  <text x="523" y="250" text-anchor="middle" font-size="11.5" fill="#c05a2e">每 +6 dB</text>
  <path d="M470,96 C500,76 545,76 575,96" stroke="#1d6b40" stroke-width="1.5" fill="none"/>
  <text x="523" y="66" text-anchor="middle" font-size="11.5" fill="#1d6b40">音量 ×2</text>

  <!-- 静音与满档标记 -->
  <text x="140" y="222" text-anchor="middle" font-size="11" fill="#7a7468">SILENT（静音）</text>
  <text x="575" y="222" text-anchor="middle" font-size="11" fill="#7a7468">“原样播放”</text>

  <!-- 底注 -->
  <line x1="36" y1="278" x2="724" y2="278" stroke="#b8b1a4" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="380" y="304" text-anchor="middle" font-size="12" fill="#4a463f">Volume::Linear(0.5) 与 Volume::Decibels(−6.02) 是同一个音量的两种写法</text>
  <text x="380" y="326" text-anchor="middle" font-size="12" fill="#7a7468">音量叠加（如乘上总闸）：Linear 相乘，Decibels 相加——结果相同</text>
</svg>
