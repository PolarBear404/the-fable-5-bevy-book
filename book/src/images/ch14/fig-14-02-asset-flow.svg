<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#3b6ed9"/>
    </marker>
    <marker id="arr-o" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#c05a2e"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#3f8a4e"/>
    </marker>
  </defs>

  <!-- 卡片底 -->
  <rect x="0" y="0" width="760" height="420" rx="10" fill="#f7f5f0"/>

  <!-- 前台泳道 -->
  <rect x="24" y="40" width="712" height="130" rx="8" fill="#eceaf6" stroke="#b9b3d6" stroke-width="1"/>
  <text x="40" y="64" font-size="14" fill="#5a548a" font-weight="bold">前台：主循环（每帧照常跑）</text>

  <!-- System 盒 -->
  <rect x="52" y="84" width="120" height="62" rx="8" fill="#3b6ed9" opacity="0.92"/>
  <text x="112" y="110" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="bold">System</text>
  <text x="112" y="130" text-anchor="middle" font-size="12.5" fill="#dce6fb">（你的代码）</text>

  <!-- AssetServer 盒 -->
  <rect x="300" y="84" width="150" height="62" rx="8" fill="#c05a2e" opacity="0.92"/>
  <text x="375" y="110" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="bold">AssetServer</text>
  <text x="375" y="130" text-anchor="middle" font-size="12.5" fill="#fbe3d6">库房柜台（Resource）</text>

  <!-- load 调用与 Handle 返回 -->
  <line x1="172" y1="100" x2="294" y2="100" stroke="#3b6ed9" stroke-width="2.5" marker-end="url(#arr-b)"/>
  <text x="233" y="92" text-anchor="middle" font-size="13" fill="#3b6ed9" stroke="#eceaf6" stroke-width="7" paint-order="stroke">load(&quot;路径&quot;)</text>
  <line x1="294" y1="132" x2="172" y2="132" stroke="#c05a2e" stroke-width="2.5" marker-end="url(#arr-o)"/>
  <text x="233" y="152" text-anchor="middle" font-size="13" fill="#c05a2e" font-weight="bold">Handle 立刻返回</text>

  <!-- Assets<T> 货架（横跨两道） -->
  <rect x="560" y="120" width="150" height="180" rx="8" fill="#3f8a4e" opacity="0.92"/>
  <text x="635" y="148" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="bold">Assets&lt;T&gt;</text>
  <text x="635" y="167" text-anchor="middle" font-size="12.5" fill="#d9efdd">货架（Resource）</text>
  <line x1="576" y1="184" x2="694" y2="184" stroke="#ffffff" stroke-width="1.5" opacity="0.65"/>
  <line x1="576" y1="222" x2="694" y2="222" stroke="#ffffff" stroke-width="1.5" opacity="0.65"/>
  <line x1="576" y1="260" x2="694" y2="260" stroke="#ffffff" stroke-width="1.5" opacity="0.65"/>
  <text x="635" y="206" text-anchor="middle" font-size="12.5" fill="#eaf6ec">props/lantern.png</text>
  <text x="635" y="244" text-anchor="middle" font-size="12.5" fill="#eaf6ec">scripts/opening.script</text>

  <!-- get 取货（晚些时候） -->
  <path d="M 172 112 C 330 58, 470 58, 600 118" fill="none" stroke="#3f8a4e" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arr-g)"/>
  <text x="408" y="72" text-anchor="middle" font-size="13" fill="#3f8a4e" font-weight="bold" stroke="#f7f5f0" stroke-width="8" paint-order="stroke">几帧之后 get(&amp;handle) → Some(货)，此前是 None</text>

  <!-- 后台泳道 -->
  <rect x="24" y="200" width="500" height="130" rx="8" fill="#efe9df" stroke="#cfc4ad" stroke-width="1"/>
  <text x="40" y="224" font-size="14" fill="#7a6c4f" font-weight="bold">后台：IO 任务（读盘解码多慢都不碍前台的事）</text>

  <!-- 派工箭头 -->
  <line x1="375" y1="146" x2="375" y2="196" stroke="#c05a2e" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arr-o)"/>
  <text x="386" y="178" font-size="12.5" fill="#c05a2e">派工</text>

  <!-- 后台三步 -->
  <rect x="64" y="244" width="100" height="56" rx="8" fill="#fffdf8" stroke="#cfc4ad" stroke-width="1.5"/>
  <text x="114" y="268" text-anchor="middle" font-size="13.5" fill="#5a5650">读文件</text>
  <text x="114" y="287" text-anchor="middle" font-size="12" fill="#8a8378">assets/…</text>

  <rect x="210" y="244" width="130" height="56" rx="8" fill="#fffdf8" stroke="#cfc4ad" stroke-width="1.5"/>
  <text x="275" y="268" text-anchor="middle" font-size="13.5" fill="#5a5650">AssetLoader</text>
  <text x="275" y="287" text-anchor="middle" font-size="12" fill="#8a8378">字节 → 资产</text>

  <rect x="386" y="244" width="100" height="56" rx="8" fill="#fffdf8" stroke="#cfc4ad" stroke-width="1.5"/>
  <text x="436" y="268" text-anchor="middle" font-size="13.5" fill="#5a5650">上架</text>
  <text x="436" y="287" text-anchor="middle" font-size="12" fill="#8a8378">广播 Added</text>

  <line x1="164" y1="272" x2="204" y2="272" stroke="#7a6c4f" stroke-width="2" marker-end="url(#arr-o)" opacity="0.6"/>
  <line x1="340" y1="272" x2="380" y2="272" stroke="#7a6c4f" stroke-width="2" marker-end="url(#arr-o)" opacity="0.6"/>
  <line x1="486" y1="272" x2="554" y2="272" stroke="#3f8a4e" stroke-width="2.5" marker-end="url(#arr-g)"/>

  <!-- 底注 -->
  <text x="380" y="368" text-anchor="middle" font-size="13.5" fill="#5a5650">Handle 是提货单：前台开单即得；货什么时候上架，由后台的文件大小说了算。</text>
  <text x="380" y="390" text-anchor="middle" font-size="13.5" fill="#5a5650">货架 Assets&lt;T&gt; 是两条时间线唯一的交汇点。</text>
</svg>
