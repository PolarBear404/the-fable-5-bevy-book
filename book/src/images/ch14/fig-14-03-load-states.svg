<svg viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-s" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#6b6660"/>
    </marker>
    <marker id="arr-ok" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#3f8a4e"/>
    </marker>
    <marker id="arr-bad" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#b8433a"/>
    </marker>
  </defs>

  <!-- 卡片底 -->
  <rect x="0" y="0" width="760" height="280" rx="10" fill="#f7f5f0"/>

  <!-- NotLoaded -->
  <rect x="40" y="100" width="150" height="64" rx="10" fill="#8a8378" opacity="0.92"/>
  <text x="115" y="127" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="bold">NotLoaded</text>
  <text x="115" y="148" text-anchor="middle" font-size="12.5" fill="#f0eee9">从没人开过单</text>

  <!-- Loading -->
  <rect x="300" y="100" width="150" height="64" rx="10" fill="#3b6ed9" opacity="0.92"/>
  <text x="375" y="127" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="bold">Loading</text>
  <text x="375" y="148" text-anchor="middle" font-size="12.5" fill="#dce6fb">在路上：读盘、解码</text>

  <!-- Loaded -->
  <rect x="566" y="36" width="150" height="64" rx="10" fill="#3f8a4e" opacity="0.92"/>
  <text x="641" y="63" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="bold">Loaded</text>
  <text x="641" y="84" text-anchor="middle" font-size="12.5" fill="#d9efdd">到货，已上架</text>

  <!-- Failed -->
  <rect x="566" y="170" width="150" height="64" rx="10" fill="#b8433a" opacity="0.92"/>
  <text x="641" y="197" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="bold">Failed(err)</text>
  <text x="641" y="218" text-anchor="middle" font-size="12.5" fill="#f6dcda">出事了，原因附在牌上</text>

  <!-- load() -->
  <line x1="190" y1="132" x2="294" y2="132" stroke="#6b6660" stroke-width="2.5" marker-end="url(#arr-s)"/>
  <text x="242" y="122" text-anchor="middle" font-size="13" fill="#6b6660" font-weight="bold">load(路径)</text>

  <!-- 成功 -->
  <line x1="450" y1="116" x2="560" y2="76" stroke="#3f8a4e" stroke-width="2.5" marker-end="url(#arr-ok)"/>
  <text x="500" y="80" text-anchor="middle" font-size="13" fill="#3f8a4e" font-weight="bold">装载成功</text>

  <!-- 失败 -->
  <line x1="450" y1="148" x2="560" y2="188" stroke="#b8433a" stroke-width="2.5" marker-end="url(#arr-bad)"/>
  <text x="502" y="184" text-anchor="middle" font-size="13" fill="#b8433a" font-weight="bold">装载失败</text>

  <!-- reload -->
  <path d="M 566 218 C 420 252, 380 220, 372 170" fill="none" stroke="#6b6660" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arr-s)"/>
  <text x="452" y="248" text-anchor="middle" font-size="12.5" fill="#6b6660">reload(路径) 重试（热重载同走此路）</text>

  <!-- 备注 -->
  <text x="380" y="32" text-anchor="middle" font-size="13" fill="#5a5650">asset_server.load_state(&amp;handle) 随时可查这块状态牌</text>
</svg>
