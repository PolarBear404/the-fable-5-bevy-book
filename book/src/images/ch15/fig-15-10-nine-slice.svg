<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-b15s" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#3b6ed9"/>
    </marker>
  </defs>

  <!-- 卡片底 -->
  <rect x="0" y="0" width="760" height="400" rx="10" fill="#f7f5f0"/>

  <text x="380" y="34" text-anchor="middle" font-size="16" fill="#4a463f" font-weight="bold">九宫格切片：四条裁线把图分成九块，各块各有各的伸缩规矩</text>

  <!-- 左：原图 48×48，border = 12 -->
  <g>
    <text x="170" y="72" text-anchor="middle" font-size="13.5" fill="#4a463f" font-weight="bold">原图 48×48，border 四边各 12</text>

    <rect x="80" y="88" width="180" height="180" fill="#efe9df" stroke="#8a8378" stroke-width="2"/>
    <!-- 裁线：12px → 45px 比例 -->
    <g stroke="#c05a2e" stroke-width="2" stroke-dasharray="7 5">
      <line x1="125" y1="88" x2="125" y2="268"/>
      <line x1="215" y1="88" x2="215" y2="268"/>
      <line x1="80" y1="133" x2="260" y2="133"/>
      <line x1="80" y1="223" x2="260" y2="223"/>
    </g>
    <!-- 四角着色 -->
    <g fill="#f6dfd2" opacity="0.95">
      <rect x="80" y="88" width="45" height="45"/>
      <rect x="215" y="88" width="45" height="45"/>
      <rect x="80" y="223" width="45" height="45"/>
      <rect x="215" y="223" width="45" height="45"/>
    </g>
    <!-- 边着色 -->
    <g fill="#dde6f7" opacity="0.95">
      <rect x="125" y="88" width="90" height="45"/>
      <rect x="125" y="223" width="90" height="45"/>
      <rect x="80" y="133" width="45" height="90"/>
      <rect x="215" y="133" width="45" height="90"/>
    </g>
    <!-- 心着色 -->
    <rect x="125" y="133" width="90" height="90" fill="#d9efdd" opacity="0.95"/>

    <g font-size="12" text-anchor="middle" fill="#4a463f">
      <text x="102" y="114">角</text><text x="238" y="114">角</text>
      <text x="102" y="249">角</text><text x="238" y="249">角</text>
      <text x="170" y="114">上边</text><text x="170" y="249">下边</text>
      <text x="102" y="182">左边</text><text x="238" y="182">右边</text>
      <text x="170" y="182">心</text>
    </g>

    <!-- border 标尺 -->
    <line x1="80" y1="282" x2="125" y2="282" stroke="#3f8a4e" stroke-width="2"/>
    <line x1="80" y1="276" x2="80" y2="288" stroke="#3f8a4e" stroke-width="2"/>
    <line x1="125" y1="276" x2="125" y2="288" stroke="#3f8a4e" stroke-width="2"/>
    <text x="102" y="304" text-anchor="middle" font-size="12.5" fill="#3f8a4e" font-weight="bold">12 像素</text>
  </g>

  <!-- 箭头：custom_size 拉宽 -->
  <line x1="284" y1="178" x2="344" y2="178" stroke="#3b6ed9" stroke-width="3" marker-end="url(#arr-b15s)"/>
  <text x="314" y="162" text-anchor="middle" font-size="12.5" fill="#3b6ed9" font-weight="bold">custom_size</text>
  <text x="314" y="198" text-anchor="middle" font-size="12.5" fill="#3b6ed9">拉成 340×150</text>

  <!-- 右：拉伸后的九块 -->
  <g>
    <text x="530" y="72" text-anchor="middle" font-size="13.5" fill="#4a463f" font-weight="bold">拉伸后：角不变形，边只顺一个方向走，心两头都走</text>

    <!-- 总框 340×150 → 画 340×150 @ (360,103) -->
    <rect x="360" y="103" width="340" height="150" fill="#efe9df" stroke="#8a8378" stroke-width="2"/>
    <!-- 角 45px 不变 -->
    <g fill="#f6dfd2">
      <rect x="360" y="103" width="45" height="45"/>
      <rect x="655" y="103" width="45" height="45"/>
      <rect x="360" y="208" width="45" height="45"/>
      <rect x="655" y="208" width="45" height="45"/>
    </g>
    <g fill="#dde6f7">
      <rect x="405" y="103" width="250" height="45"/>
      <rect x="405" y="208" width="250" height="45"/>
      <rect x="360" y="148" width="45" height="60"/>
      <rect x="655" y="148" width="45" height="60"/>
    </g>
    <rect x="405" y="148" width="250" height="60" fill="#d9efdd"/>
    <g stroke="#c05a2e" stroke-width="1.6" stroke-dasharray="6 4" fill="none">
      <line x1="405" y1="103" x2="405" y2="253"/>
      <line x1="655" y1="103" x2="655" y2="253"/>
      <line x1="360" y1="148" x2="700" y2="148"/>
      <line x1="360" y1="208" x2="700" y2="208"/>
    </g>

    <g font-size="12" text-anchor="middle" fill="#4a463f">
      <text x="382" y="130">原样</text>
      <text x="678" y="130">原样</text>
      <text x="382" y="235">原样</text>
      <text x="678" y="235">原样</text>
      <text x="530" y="130">→ 只横向 ←</text>
      <text x="530" y="235">→ 只横向 ←</text>
      <text x="382" y="182">竖向</text>
      <text x="678" y="182">竖向</text>
      <text x="530" y="176">两个方向都伸缩</text>
      <text x="530" y="194">（Stretch 或 Tile）</text>
    </g>
  </g>

  <!-- 底注 -->
  <rect x="80" y="324" width="600" height="56" rx="8" fill="#eceaf6" stroke="#b9b3d6" stroke-width="1"/>
  <text x="100" y="348" font-size="13" fill="#5a548a" font-weight="bold">角的"原样"以 max_corner_scale 为上限（默认 1.0 = 原图像素尺寸）；</text>
  <text x="100" y="368" font-size="13" fill="#5a548a">像素风整体放大 4 倍时，把它放开到 4.0，角才跟得上全场的放大倍数。</text>
</svg>
