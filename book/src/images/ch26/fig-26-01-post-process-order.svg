<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="430" viewBox="0 0 1160 430" role="img" aria-labelledby="title desc">
  <title id="title">第 26 章后处理顺序示意图</title>
  <desc id="desc">从主渲染通道到运动模糊、TAA、Bloom、景深、色差、Tonemapping、FXAA/SMAA 和 CAS 的简化顺序图。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#3f4652"/>
    </marker>
    <style>
      .bg { fill: #f7f5f0; stroke: #d8d2c5; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #3f4652; stroke-width: 2; rx: 14; }
      .box-hdr { fill: #eef6ff; }
      .box-aa { fill: #f0fbf3; }
      .box-warn { fill: #fff3e1; }
      .title { font: 700 25px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #222831; }
      .text { font: 19px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #2c333d; }
      .note { font: 16px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #606975; }
      .line { stroke: #3f4652; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #9aa3ad; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="16" y="16" width="1128" height="398" rx="22" class="bg"/>
  <text x="54" y="58" class="title">Camera3d 的主画面进入后处理链</text>
  <text x="54" y="88" class="note">真实 render graph 更细；本图只保留本章要操作的相机组件与大致相对顺序。</text>

  <rect x="54" y="134" width="150" height="82" class="box box-hdr"/>
  <text x="83" y="168" class="text">Main pass</text>
  <text x="78" y="194" class="note">HDR texture</text>

  <rect x="246" y="134" width="142" height="82" class="box"/>
  <text x="279" y="168" class="text">Motion</text>
  <text x="286" y="194" class="note">blur</text>

  <rect x="430" y="134" width="118" height="82" class="box box-aa"/>
  <text x="467" y="168" class="text">TAA</text>
  <text x="454" y="194" class="note">history</text>

  <rect x="590" y="134" width="128" height="82" class="box"/>
  <text x="625" y="168" class="text">Bloom</text>
  <text x="618" y="194" class="note">HDR only</text>

  <rect x="760" y="134" width="138" height="82" class="box"/>
  <text x="797" y="168" class="text">DOF</text>
  <text x="784" y="194" class="note">depth read</text>

  <rect x="940" y="134" width="142" height="82" class="box"/>
  <text x="967" y="168" class="text">Chromatic</text>
  <text x="974" y="194" class="note">aberration</text>

  <path d="M204 175 H246" class="line"/>
  <path d="M388 175 H430" class="line"/>
  <path d="M548 175 H590" class="line"/>
  <path d="M718 175 H760" class="line"/>
  <path d="M898 175 H940" class="line"/>

  <rect x="286" y="278" width="158" height="82" class="box box-hdr"/>
  <text x="309" y="312" class="text">Tonemapping</text>
  <text x="312" y="338" class="note">HDR -> display</text>

  <rect x="508" y="278" width="142" height="82" class="box box-aa"/>
  <text x="546" y="312" class="text">FXAA</text>
  <text x="532" y="338" class="note">or SMAA</text>

  <rect x="714" y="278" width="142" height="82" class="box box-aa"/>
  <text x="752" y="312" class="text">CAS</text>
  <text x="736" y="338" class="note">sharpen</text>

  <rect x="920" y="278" width="126" height="82" class="box box-warn"/>
  <text x="952" y="312" class="text">Present</text>
  <text x="947" y="338" class="note">to window</text>

  <path d="M1011 216 C1011 252 365 244 365 278" class="line"/>
  <path d="M444 319 H508" class="line"/>
  <path d="M650 319 H714" class="line"/>
  <path d="M856 319 H920" class="line"/>

  <path d="M489 134 C489 108 812 108 812 134" class="dash"/>
  <text x="575" y="104" class="note">TAA 要求 Msaa::Off，并依赖 TemporalJitter / DepthPrepass / MotionVectorPrepass</text>
</svg>
