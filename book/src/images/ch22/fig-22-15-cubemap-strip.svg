<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-c22" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#c05a2e"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="400" rx="10" fill="#f7f5f0"/>
  <text x="380" y="34" text-anchor="middle" font-size="16" fill="#4a463f" font-weight="bold">一条竖布，裁成六面天——cubemap 的接头暗号</text>

  <!-- ===== 左：竖条 PNG ===== -->
  <g>
    <text x="120" y="70" text-anchor="middle" font-size="12.5" fill="#4a463f" font-weight="bold">night_cubemap.png</text>
    <text x="120" y="86" text-anchor="middle" font-size="10.5" fill="#7a7468">512 × 3072：宽 1 份，高 6 份</text>
    <!-- 六格竖条 -->
    <g stroke="#8a8378" stroke-width="1.5">
      <rect x="90" y="96"  width="60" height="44" fill="#1a2238"/>
      <rect x="90" y="140" width="60" height="44" fill="#1a2238"/>
      <rect x="90" y="184" width="60" height="44" fill="#10141f"/>
      <rect x="90" y="228" width="60" height="44" fill="#2a3149"/>
      <rect x="90" y="272" width="60" height="44" fill="#1a2238"/>
      <rect x="90" y="316" width="60" height="44" fill="#1a2238"/>
    </g>
    <!-- 面名 -->
    <g font-size="11" fill="#e8e2d4" text-anchor="middle" font-family="Consolas, monospace">
      <text x="120" y="122">+X</text>
      <text x="120" y="166">−X</text>
      <text x="120" y="210">+Y</text>
      <text x="120" y="254">−Y</text>
      <text x="120" y="298">+Z</text>
      <text x="120" y="342">−Z</text>
    </g>
    <!-- 月亮点在 +Z -->
    <circle cx="136" cy="290" r="6" fill="#e4e8f0"/>
  </g>

  <!-- 中间箭头与咒语 -->
  <g>
    <path d="M186,224 L296,224" stroke="#c05a2e" stroke-width="2.5" marker-end="url(#arr-c22)"/>
    <text x="240" y="204" text-anchor="middle" font-size="10.5" fill="#c05a2e" font-family="Consolas, monospace">reinterpret_stacked_2d_as_array(6)</text>
    <text x="240" y="246" text-anchor="middle" font-size="10.5" fill="#c05a2e" font-family="Consolas, monospace">TextureViewDimension::Cube</text>
  </g>

  <!-- ===== 右：立方体（等轴测） ===== -->
  <g>
    <text x="520" y="70" text-anchor="middle" font-size="12.5" fill="#4a463f" font-weight="bold">包住相机的六面天</text>
    <!-- 立方体三可见面 -->
    <path d="M420,170 L520,130 L620,170 L520,210 z" fill="#2a3149" stroke="#8a8378" stroke-width="1.5"/>
    <path d="M420,170 L520,210 L520,330 L420,290 z" fill="#1a2238" stroke="#8a8378" stroke-width="1.5"/>
    <path d="M620,170 L520,210 L520,330 L620,290 z" fill="#141a2c" stroke="#8a8378" stroke-width="1.5"/>
    <g font-size="11.5" fill="#e8e2d4" text-anchor="middle" font-family="Consolas, monospace">
      <text x="520" y="176">+Y 天顶</text>
      <text x="468" y="250">+Z</text>
      <text x="572" y="250">+X</text>
    </g>
    <!-- 月亮画在 +Z 面 -->
    <circle cx="478" cy="222" r="7" fill="#e4e8f0"/>
    <!-- 相机在中心 -->
    <circle cx="520" cy="238" r="5" fill="#3b6ed9"/>
    <text x="520" y="258" text-anchor="middle" font-size="10" fill="#3b6ed9">相机在盒子正中</text>

    <text x="520" y="356" text-anchor="middle" font-size="10.5" fill="#7a7468">wgpu 的 cubemap 是左手系：镜头朝世界 −Z 看，</text>
    <text x="520" y="372" text-anchor="middle" font-size="10.5" fill="#7a7468">迎面那面是 +Z——月亮要画在 +Z 上才挂在戏台正对的天</text>
  </g>
</svg>
