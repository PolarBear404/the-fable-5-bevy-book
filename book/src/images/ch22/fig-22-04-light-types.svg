<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="960" height="360" rx="16" fill="#f7f5f0"/>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c8772e"/>
    </marker>
  </defs>

  <!-- 分隔线 -->
  <line x1="320" y1="40" x2="320" y2="320" stroke="#d9d4c8" stroke-width="2"/>
  <line x1="640" y1="40" x2="640" y2="320" stroke="#d9d4c8" stroke-width="2"/>

  <!-- 平行光 -->
  <text x="160" y="64" text-anchor="middle" font-size="24" font-weight="700" fill="#2c2c2c">平行光 Directional</text>
  <text x="40" y="96" font-size="20" fill="#a23b1e">☀</text>
  <g stroke="#c8772e" stroke-width="3" marker-end="url(#ah)">
    <line x1="60" y1="110" x2="120" y2="200"/>
    <line x1="110" y1="100" x2="170" y2="190"/>
    <line x1="160" y1="110" x2="220" y2="200"/>
    <line x1="210" y1="100" x2="270" y2="190"/>
  </g>
  <line x1="40" y1="250" x2="280" y2="250" stroke="#8a8275" stroke-width="3"/>
  <text x="160" y="296" text-anchor="middle" font-size="17" fill="#555">只有方向，亮度记 lux</text>

  <!-- 点光 -->
  <text x="480" y="64" text-anchor="middle" font-size="24" font-weight="700" fill="#2c2c2c">点光 Point</text>
  <circle cx="480" cy="150" r="11" fill="#e0a64b"/>
  <g stroke="#c8772e" stroke-width="3" marker-end="url(#ah)">
    <line x1="480" y1="150" x2="480" y2="90"/>
    <line x1="480" y1="150" x2="544" y2="110"/>
    <line x1="480" y1="150" x2="566" y2="160"/>
    <line x1="480" y1="150" x2="540" y2="210"/>
    <line x1="480" y1="150" x2="480" y2="222"/>
    <line x1="480" y1="150" x2="420" y2="210"/>
    <line x1="480" y1="150" x2="394" y2="160"/>
    <line x1="480" y1="150" x2="416" y2="110"/>
  </g>
  <text x="480" y="296" text-anchor="middle" font-size="17" fill="#555">有位置，记 lumens，越远越暗</text>

  <!-- 聚光 -->
  <text x="800" y="64" text-anchor="middle" font-size="24" font-weight="700" fill="#2c2c2c">聚光 Spot</text>
  <circle cx="800" cy="100" r="10" fill="#e0a64b"/>
  <path d="M800 100 L724 240 L876 240 z" fill="#f1d9a8" stroke="#d9b96a" stroke-width="2"/>
  <g stroke="#c8772e" stroke-width="3" marker-end="url(#ah)">
    <line x1="800" y1="100" x2="760" y2="220"/>
    <line x1="800" y1="100" x2="800" y2="226"/>
    <line x1="800" y1="100" x2="840" y2="220"/>
  </g>
  <text x="800" y="296" text-anchor="middle" font-size="17" fill="#555">有朝向，内锥全亮、外锥渐隐</text>
</svg>
