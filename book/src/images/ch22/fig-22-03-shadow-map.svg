<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="980" height="430" rx="16" fill="#f7f5f0"/>
  <defs>
    <marker id="sm-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c8772e"/>
    </marker>
  </defs>
  <line x1="490" y1="36" x2="490" y2="394" stroke="#d9d4c8" stroke-width="2"/>

  <!-- ① 从灯的视角记深度 -->
  <text x="245" y="44" text-anchor="middle" font-size="21" font-weight="700" fill="#2c2c2c">① 从灯的视角，记下深度图</text>
  <text x="40" y="92" font-size="22" fill="#a23b1e">☀</text>
  <text x="64" y="92" font-size="15" fill="#555">灯</text>
  <!-- 地面 -->
  <line x1="40" y1="300" x2="450" y2="300" stroke="#8a8275" stroke-width="3"/>
  <!-- 遮挡物 -->
  <rect x="150" y="232" width="70" height="68" fill="#c97b5a" stroke="#9c5238" stroke-width="2"/>
  <text x="185" y="272" text-anchor="middle" font-size="14" fill="#5a2b1c">遮挡物</text>
  <!-- 光线：分别打到遮挡物顶与地面 -->
  <g stroke="#c8772e" stroke-width="2.5" marker-end="url(#sm-ar)">
    <line x1="58" y1="92" x2="120" y2="300"/>
    <line x1="58" y1="92" x2="172" y2="232"/>
    <line x1="58" y1="92" x2="340" y2="300"/>
    <line x1="58" y1="92" x2="420" y2="300"/>
  </g>
  <!-- 深度图条 -->
  <text x="245" y="346" text-anchor="middle" font-size="14" fill="#555">深度图：每个方向「最近遮挡有多远」</text>
  <g>
    <rect x="90" y="356" width="44" height="26" fill="#cfd6da" stroke="#9aa3a8"/>
    <rect x="134" y="356" width="44" height="26" fill="#7d878d" stroke="#9aa3a8"/>
    <rect x="178" y="356" width="44" height="26" fill="#aeb6bb" stroke="#9aa3a8"/>
    <rect x="222" y="356" width="44" height="26" fill="#c4ccd0" stroke="#9aa3a8"/>
    <rect x="266" y="356" width="44" height="26" fill="#cfd6da" stroke="#9aa3a8"/>
    <rect x="310" y="356" width="44" height="26" fill="#d6dde0" stroke="#9aa3a8"/>
    <text x="156" y="402" text-anchor="middle" font-size="12" fill="#777">↑遮挡物：近</text>
  </g>

  <!-- ② 着色时比对 -->
  <text x="735" y="44" text-anchor="middle" font-size="21" font-weight="700" fill="#2c2c2c">② 着色时，拿深度一比</text>
  <text x="540" y="92" font-size="22" fill="#a23b1e">☀</text>
  <line x1="540" y1="300" x2="950" y2="300" stroke="#8a8275" stroke-width="3"/>
  <rect x="650" y="232" width="70" height="68" fill="#c97b5a" stroke="#9c5238" stroke-width="2"/>
  <!-- 被挡点 B：光线被遮挡物顶截住 -->
  <line x1="558" y1="92" x2="672" y2="232" stroke="#c8772e" stroke-width="2.5"/>
  <line x1="672" y1="232" x2="812" y2="300" stroke="#b94a3a" stroke-width="2.5" stroke-dasharray="6 5"/>
  <circle cx="812" cy="300" r="7" fill="#b94a3a"/>
  <text x="806" y="324" text-anchor="end" font-size="14" fill="#b94a3a">B：比记录更远 → 在影子里</text>
  <!-- 受光点 A：光线直达地面 -->
  <line x1="558" y1="92" x2="900" y2="300" stroke="#c8772e" stroke-width="2.5" marker-end="url(#sm-ar)"/>
  <circle cx="900" cy="300" r="7" fill="#5a8f4e"/>
  <text x="906" y="350" text-anchor="end" font-size="14" fill="#3f7a36">A：正是记录值 → 受光</text>
</svg>
