<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-l22" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#c8922a"/>
    </marker>
  </defs>

  <!-- 卡片底 -->
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#f7f5f0"/>
  <text x="380" y="34" text-anchor="middle" font-size="16" fill="#4a463f" font-weight="bold">灯的全家福——光从哪来，往哪去</text>

  <!-- ===== 左上：DirectionalLight ===== -->
  <g>
    <rect x="28" y="56" width="344" height="168" rx="8" fill="#efece4"/>
    <text x="44" y="82" font-size="13.5" fill="#4a463f" font-weight="bold">DirectionalLight　平行光</text>
    <text x="44" y="100" font-size="11" fill="#7a7468">只有方向，没有位置；照度 illuminance（勒克斯）</text>
    <!-- 一排平行箭头，斜着下来 -->
    <g stroke="#c8922a" stroke-width="2.5" marker-end="url(#arr-l22)">
      <line x1="90"  y1="118" x2="126" y2="172"/>
      <line x1="150" y1="118" x2="186" y2="172"/>
      <line x1="210" y1="118" x2="246" y2="172"/>
      <line x1="270" y1="118" x2="306" y2="172"/>
    </g>
    <!-- 台面 -->
    <line x1="60" y1="196" x2="340" y2="196" stroke="#b8b1a4" stroke-width="3"/>
    <text x="200" y="214" text-anchor="middle" font-size="10.5" fill="#7a7468">处处同一个方向、同一个强度——太阳、月亮</text>
  </g>

  <!-- ===== 右上：PointLight ===== -->
  <g>
    <rect x="388" y="56" width="344" height="168" rx="8" fill="#efece4"/>
    <text x="404" y="82" font-size="13.5" fill="#4a463f" font-weight="bold">PointLight　点光</text>
    <text x="404" y="100" font-size="11" fill="#7a7468">从一点向四面八方；光通量 intensity（流明）</text>
    <!-- 中心灯泡 + 放射 -->
    <circle cx="560" cy="150" r="9" fill="#c8922a"/>
    <g stroke="#c8922a" stroke-width="2.5" marker-end="url(#arr-l22)">
      <line x1="560" y1="137" x2="560" y2="112"/>
      <line x1="571" y1="142" x2="595" y2="126"/>
      <line x1="573" y1="152" x2="602" y2="153"/>
      <line x1="569" y1="160" x2="592" y2="178"/>
      <line x1="560" y1="163" x2="560" y2="188"/>
      <line x1="550" y1="160" x2="528" y2="178"/>
      <line x1="547" y1="152" x2="518" y2="153"/>
      <line x1="549" y1="142" x2="525" y2="126"/>
    </g>
    <!-- range 圈 -->
    <circle cx="560" cy="150" r="52" fill="none" stroke="#b8b1a4" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="646" y="150" font-size="10.5" fill="#7a7468">range：出圈没光</text>
    <text x="560" y="214" text-anchor="middle" font-size="10.5" fill="#7a7468">灯笼、堂灯、火把</text>
  </g>

  <!-- ===== 左下：SpotLight ===== -->
  <g>
    <rect x="28" y="240" width="344" height="168" rx="8" fill="#efece4"/>
    <text x="44" y="266" font-size="13.5" fill="#4a463f" font-weight="bold">SpotLight　聚光</text>
    <text x="44" y="284" font-size="11" fill="#7a7468">点光装进罩子，只往锥里放；沿自己的 −Z 照</text>
    <!-- 灯 + 锥 -->
    <circle cx="110" cy="306" r="8" fill="#c8922a"/>
    <path d="M110,306 L212,384 M110,306 L268,340" stroke="#c8922a" stroke-width="2"/>
    <path d="M110,306 L246,366" stroke="#c8922a" stroke-width="1.2" stroke-dasharray="4 4"/>
    <path d="M232,352 A46,46 0 0 1 244,368" fill="none" stroke="#3b6ed9" stroke-width="1.8"/>
    <path d="M242,338 A62,62 0 0 1 258,356" fill="none" stroke="#1d6b40" stroke-width="1.8"/>
    <text x="286" y="342" font-size="10.5" fill="#1d6b40">outer_angle 外沿</text>
    <text x="252" y="382" font-size="10.5" fill="#3b6ed9">inner_angle 内沿</text>
    <text x="140" y="398" font-size="10.5" fill="#7a7468">内沿到外沿之间，光顺滑羽化</text>
  </g>

  <!-- ===== 右下：RectLight ===== -->
  <g>
    <rect x="388" y="240" width="344" height="168" rx="8" fill="#efece4"/>
    <text x="404" y="266" font-size="13.5" fill="#4a463f" font-weight="bold">RectLight　矩形面光</text>
    <text x="404" y="284" font-size="11" fill="#7a7468">一整块面在发光，朝自己的 −Z；不投影子</text>
    <!-- 发光板（斜放的平行四边形）+ 出光 -->
    <path d="M470,306 L560,294 L560,346 L470,358 z" fill="#e8c37a" stroke="#c8922a" stroke-width="2"/>
    <g stroke="#c8922a" stroke-width="2" marker-end="url(#arr-l22)">
      <line x1="576" y1="302" x2="614" y2="298"/>
      <line x1="576" y1="320" x2="618" y2="320"/>
      <line x1="576" y1="338" x2="614" y2="342"/>
    </g>
    <text x="474" y="330" font-size="10" fill="#8a5a1a">width × height</text>
    <text x="404" y="382" font-size="10.5" fill="#7a7468">灯箱、窗口、柔光箱——需要 cargo feature</text>
    <text x="404" y="398" font-size="10.5" fill="#c05a2e" font-family="Consolas, monospace">area_light_luts</text>
  </g>
</svg>
