<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 440" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="980" height="440" rx="16" fill="#f7f5f0"/>
  <defs>
    <marker id="c-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c8772e"/>
    </marker>
    <radialGradient id="metal" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#f3d39a"/>
      <stop offset="55%" stop-color="#c8862f"/>
      <stop offset="100%" stop-color="#6b4516"/>
    </radialGradient>
  </defs>
  <line x1="455" y1="40" x2="455" y2="400" stroke="#d9d4c8" stroke-width="2"/>

  <!-- 左：立方体贴图展开成盒子的六张面 -->
  <text x="235" y="46" text-anchor="middle" font-size="20" font-weight="700" fill="#2c2c2c">立方体贴图：六张面拼成一个盒子</text>
  <g font-size="13" text-anchor="middle">
    <!-- +Y 上 -->
    <rect x="160" y="86" width="80" height="80" fill="#ece0c6" stroke="#9c8f76"/>
    <text x="200" y="130" fill="#6b5e44">上：天光</text>
    <!-- 中排：左 前 右 后 -->
    <rect x="80" y="166" width="80" height="80" fill="#7d5746" stroke="#9c8f76"/>
    <text x="120" y="210" fill="#f0e2cf">左壁</text>
    <rect x="160" y="166" width="80" height="80" fill="#8a604e" stroke="#9c8f76"/>
    <text x="200" y="205" fill="#f0e2cf">前壁</text>
    <text x="200" y="222" fill="#ffcf86">·灯笼</text>
    <rect x="240" y="166" width="80" height="80" fill="#7d5746" stroke="#9c8f76"/>
    <text x="280" y="210" fill="#f0e2cf">右壁</text>
    <rect x="320" y="166" width="80" height="80" fill="#6f5a4a" stroke="#9c8f76"/>
    <text x="360" y="210" fill="#f0e2cf">后壁</text>
    <!-- -Y 下 -->
    <rect x="160" y="246" width="80" height="80" fill="#332a22" stroke="#9c8f76"/>
    <text x="200" y="290" fill="#c9bca8">下：地板</text>
  </g>
  <text x="235" y="372" text-anchor="middle" font-size="14" fill="#555">就是站在场景中心，向六个方向各看到的样子</text>

  <!-- 右：反射采样 -->
  <text x="720" y="46" text-anchor="middle" font-size="20" font-weight="700" fill="#2c2c2c">反射方向 → 到盒子里取色</text>
  <!-- 金属球 -->
  <circle cx="740" cy="250" r="78" fill="url(#metal)" stroke="#5a3c14" stroke-width="1.5"/>
  <text x="740" y="350" text-anchor="middle" font-size="13" fill="#6b5e44">镜面金属球</text>
  <!-- 眼睛/相机 -->
  <path d="M520 330 L548 314 L548 346 Z" fill="#444"/>
  <text x="524" y="368" font-size="13" fill="#555">相机</text>
  <!-- 表面点 P -->
  <circle cx="690" cy="212" r="5" fill="#2c2c2c"/>
  <text x="676" y="206" font-size="13" fill="#2c2c2c">P</text>
  <!-- 视线 → P -->
  <line x1="548" y1="324" x2="690" y2="212" stroke="#777" stroke-width="2" marker-end="url(#c-ar)"/>
  <text x="588" y="280" font-size="12" fill="#777">视线</text>
  <!-- 法线（球心 → P 外延） -->
  <line x1="690" y1="212" x2="652" y2="170" stroke="#3b7a9e" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="636" y="166" font-size="12" fill="#3b7a9e">法线</text>
  <!-- 反射方向 R → 指向盒子某面 -->
  <line x1="690" y1="212" x2="610" y2="120" stroke="#c8772e" stroke-width="2.6" marker-end="url(#c-ar)"/>
  <text x="600" y="112" font-size="13" fill="#a23b1e" text-anchor="end">反射方向 → 取盒子那一面的颜色</text>
  <text x="720" y="392" text-anchor="middle" font-size="14" fill="#555">每个可见点都这样取一次色，金属便照出了整座暖阁</text>
</svg>
