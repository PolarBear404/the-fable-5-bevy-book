<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-v" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#c05a2e"/>
    </marker>
    <marker id="arrow-w" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#3b6ed9"/>
    </marker>
  </defs>

  <!-- 卡片底 -->
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#f7f5f0"/>

  <!-- 窗口（渲染目标） -->
  <rect x="120" y="70" width="520" height="300" rx="4" fill="#241e18" stroke="#8a8378" stroke-width="1.5"/>
  <text x="380" y="56" text-anchor="middle" font-size="15" fill="#5a5650">窗口（渲染目标 / 视口）</text>

  <!-- 视口坐标系：原点左上，y 向下 -->
  <circle cx="120" cy="70" r="5" fill="#c05a2e"/>
  <text x="108" y="50" text-anchor="middle" font-size="14" fill="#c05a2e" font-weight="bold">(0, 0)</text>
  <line x1="120" y1="70" x2="240" y2="70" stroke="#c05a2e" stroke-width="3" marker-end="url(#arrow-v)"/>
  <text x="248" y="86" font-size="14" fill="#c05a2e" font-weight="bold">+x</text>
  <line x1="120" y1="70" x2="120" y2="190" stroke="#c05a2e" stroke-width="3" marker-end="url(#arrow-v)"/>
  <text x="100" y="200" font-size="14" fill="#c05a2e" font-weight="bold">+y</text>
  <text x="138" y="106" font-size="13.5" fill="#d8835c">视口坐标：原点在左上角，y 朝下，</text>
  <text x="138" y="124" font-size="13.5" fill="#d8835c">单位是逻辑像素</text>

  <!-- 世界坐标系：原点中心（相机所在），y 向上 -->
  <circle cx="380" cy="220" r="5" fill="#3b6ed9"/>
  <line x1="380" y1="220" x2="500" y2="220" stroke="#3b6ed9" stroke-width="3" marker-end="url(#arrow-w)"/>
  <text x="508" y="236" font-size="14" fill="#3b6ed9" font-weight="bold">+x</text>
  <line x1="380" y1="220" x2="380" y2="100" stroke="#3b6ed9" stroke-width="3" marker-end="url(#arrow-w)"/>
  <text x="390" y="98" font-size="14" fill="#3b6ed9" font-weight="bold">+y</text>
  <text x="380" y="248" text-anchor="middle" font-size="13.5" fill="#7d9fe8">世界坐标：原点在相机中心，y 朝上</text>

  <!-- 角点对应关系 -->
  <circle cx="640" cy="370" r="5" fill="#c05a2e"/>
  <text x="640" y="394" text-anchor="middle" font-size="14" fill="#c05a2e" font-weight="bold">(宽, 高)</text>

  <text x="124" y="390" font-size="13.5" fill="#5a5650">视口 (0, 0) ↔ 世界 (min.x, <tspan font-weight="bold">max.y</tspan>)</text>
  <text x="404" y="416" font-size="13.5" fill="#5a5650">视口 (宽, 高) ↔ 世界 (max.x, <tspan font-weight="bold">min.y</tspan>)</text>
</svg>
