<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-g18b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#1d6b40"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#f7f5f0"/>

  <text x="380" y="34" text-anchor="middle" font-size="16" fill="#4a463f" font-weight="bold">鼓师的水缸：每帧倒进 delta，攒够一个步长就跑一拍</text>
  <text x="380" y="56" text-anchor="middle" font-size="12" fill="#7a7468">Listing 18-6 的账：每帧流逝 30 毫秒，步长 50 毫秒</text>

  <!-- 五帧五列：水位 = 本帧结算前攒下的时间 -->
  <!-- 比例：1 毫秒 = 2px，缸高 100px(=50ms) -->
  <g font-size="12" text-anchor="middle">
    <!-- 第 1 帧：攒 0，倒入 0（首帧 delta 为 0） -->
    <g>
      <rect x="96" y="180" width="64" height="100" fill="#ffffff" stroke="#b8b1a4" stroke-width="1.5"/>
      <text x="128" y="304" fill="#4a463f" font-weight="bold">第 1 帧</text>
      <text x="128" y="322" fill="#7a7468">+0</text>
      <text x="128" y="352" fill="#a09a8e">0 拍</text>
      <text x="128" y="372" fill="#7a7468">余 0</text>
    </g>
    <!-- 第 2 帧：倒入 30 → 30，不够 -->
    <g>
      <rect x="216" y="180" width="64" height="100" fill="#ffffff" stroke="#b8b1a4" stroke-width="1.5"/>
      <rect x="216" y="220" width="64" height="60" fill="#dde6f7"/>
      <text x="248" y="256" fill="#274a91">30</text>
      <text x="248" y="304" fill="#4a463f" font-weight="bold">第 2 帧</text>
      <text x="248" y="322" fill="#7a7468">+30</text>
      <text x="248" y="352" fill="#a09a8e">0 拍</text>
      <text x="248" y="372" fill="#7a7468">余 30</text>
    </g>
    <!-- 第 3 帧：30+30=60 ≥ 50 → 跑一拍，余 10 -->
    <g>
      <rect x="336" y="160" width="64" height="120" fill="#ffffff" stroke="#b8b1a4" stroke-width="1.5"/>
      <rect x="336" y="160" width="64" height="120" fill="#dde6f7"/>
      <!-- 步长线 -->
      <line x1="328" y1="180" x2="408" y2="180" stroke="#1d6b40" stroke-width="2" stroke-dasharray="5,3"/>
      <text x="368" y="226" fill="#274a91">60</text>
      <text x="368" y="304" fill="#4a463f" font-weight="bold">第 3 帧</text>
      <text x="368" y="322" fill="#7a7468">+30</text>
      <text x="368" y="352" fill="#1d6b40" font-weight="bold">1 拍</text>
      <text x="368" y="372" fill="#7a7468">余 10</text>
    </g>
    <!-- 第 4 帧：10+30=40，不够 -->
    <g>
      <rect x="456" y="180" width="64" height="100" fill="#ffffff" stroke="#b8b1a4" stroke-width="1.5"/>
      <rect x="456" y="200" width="64" height="80" fill="#dde6f7"/>
      <text x="488" y="246" fill="#274a91">40</text>
      <text x="488" y="304" fill="#4a463f" font-weight="bold">第 4 帧</text>
      <text x="488" y="322" fill="#7a7468">+30</text>
      <text x="488" y="352" fill="#a09a8e">0 拍</text>
      <text x="488" y="372" fill="#7a7468">余 40</text>
    </g>
    <!-- 第 5 帧：40+30=70 → 跑一拍，余 20 -->
    <g>
      <rect x="576" y="140" width="64" height="140" fill="#ffffff" stroke="#b8b1a4" stroke-width="1.5"/>
      <rect x="576" y="140" width="64" height="140" fill="#dde6f7"/>
      <line x1="568" y1="180" x2="648" y2="180" stroke="#1d6b40" stroke-width="2" stroke-dasharray="5,3"/>
      <text x="608" y="216" fill="#274a91">70</text>
      <text x="608" y="304" fill="#4a463f" font-weight="bold">第 5 帧</text>
      <text x="608" y="322" fill="#7a7468">+30</text>
      <text x="608" y="352" fill="#1d6b40" font-weight="bold">1 拍</text>
      <text x="608" y="372" fill="#7a7468">余 20</text>
    </g>
  </g>

  <!-- 步长基准线说明 -->
  <text x="60" y="184" font-size="12" fill="#1d6b40">步长 50</text>

  <!-- 拍发生的箭头 -->
  <path d="M368,128 L368,152" stroke="#1d6b40" stroke-width="2" fill="none" marker-end="url(#arr-g18b)"/>
  <text x="368" y="118" text-anchor="middle" font-size="12" fill="#1d6b40" font-weight="bold">FixedUpdate 跑一轮</text>
  <path d="M608,108 L608,132" stroke="#1d6b40" stroke-width="2" fill="none" marker-end="url(#arr-g18b)"/>
  <text x="608" y="98" text-anchor="middle" font-size="12" fill="#1d6b40" font-weight="bold">再跑一轮</text>

  <text x="380" y="410" text-anchor="middle" font-size="12" fill="#7a7468">水位超过步长几倍就连跑几拍；没花完的零头叫 overstep，原样留到下一帧</text>
</svg>
