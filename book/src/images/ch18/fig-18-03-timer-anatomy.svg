<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#f7f5f0"/>

  <text x="380" y="34" text-anchor="middle" font-size="16" fill="#4a463f" font-weight="bold">Timer 的一生：tick 喂多少走多少</text>

  <!-- ===== Once：冷却 0.8 秒 ===== -->
  <text x="150" y="74" font-size="13" fill="#4a463f" font-weight="bold">TimerMode::Once（袖箭冷却 0.8 秒）</text>
  <!-- 总槽 -->
  <rect x="150" y="86" width="480" height="26" fill="#ffffff" stroke="#b8b1a4" stroke-width="1"/>
  <!-- 已走进度 -->
  <rect x="150" y="86" width="300" height="26" fill="#dde6f7" stroke="none"/>
  <line x1="450" y1="82" x2="450" y2="116" stroke="#274a91" stroke-width="2"/>
  <text x="300" y="104" text-anchor="middle" font-size="12" fill="#274a91">elapsed（每帧 tick(delta) 推进）</text>
  <text x="540" y="104" text-anchor="middle" font-size="12" fill="#a09a8e">remaining</text>
  <text x="636" y="104" font-size="12" fill="#7a7468">duration</text>
  <!-- 三个时刻 -->
  <g font-size="12">
    <text x="150" y="140" fill="#7a7468">走完之前：is_finished() 假</text>
    <text x="354" y="140" fill="#1d6b40" font-weight="bold">走完那一次 tick：just_finished() 真</text>
    <text x="636" y="140" text-anchor="end" fill="#7a7468"></text>
  </g>
  <text x="150" y="160" font-size="12" fill="#7a7468">之后停在终点：is_finished() 恒真、just_finished() 只真那一回——直到 reset() 从头再走</text>

  <!-- ===== Repeating：补箭 2.5 秒 ===== -->
  <text x="150" y="208" font-size="13" fill="#4a463f" font-weight="bold">TimerMode::Repeating（补箭节拍 2.5 秒）</text>
  <!-- 循环锯齿：elapsed 涨到头就回绕 -->
  <line x1="150" y1="288" x2="630" y2="288" stroke="#b8b1a4" stroke-width="1.5"/>
  <line x1="150" y1="288" x2="270" y2="232" stroke="#b8862e" stroke-width="2"/>
  <line x1="270" y1="232" x2="270" y2="288" stroke="#b8862e" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="270" y1="288" x2="390" y2="232" stroke="#b8862e" stroke-width="2"/>
  <line x1="390" y1="232" x2="390" y2="288" stroke="#b8862e" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- 大步 tick 一口气跨两轮 -->
  <line x1="390" y1="288" x2="510" y2="232" stroke="#b8862e" stroke-width="2"/>
  <line x1="510" y1="232" x2="510" y2="288" stroke="#b8862e" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="510" y1="288" x2="570" y2="260" stroke="#b8862e" stroke-width="2"/>
  <!-- 回绕点标注 -->
  <g font-size="12" text-anchor="middle">
    <circle cx="270" cy="232" r="4" fill="#1d6b40"/>
    <circle cx="390" cy="232" r="4" fill="#1d6b40"/>
    <circle cx="510" cy="232" r="4" fill="#1d6b40"/>
    <text x="270" y="220" fill="#1d6b40">just_finished</text>
    <text x="390" y="220" fill="#1d6b40">just_finished</text>
    <text x="510" y="220" fill="#1d6b40">just_finished</text>
  </g>
  <text x="160" y="252" font-size="11" fill="#7a7468">elapsed 涨到 duration</text>
  <text x="160" y="266" font-size="11" fill="#7a7468">就回绕，永不停表</text>

  <!-- 大 delta 警示 -->
  <rect x="150" y="316" width="480" height="58" rx="8" fill="#f6ecdd" stroke="#b8862e" stroke-width="1"/>
  <text x="390" y="340" text-anchor="middle" font-size="12.5" fill="#7a5414" font-weight="bold">一帧卡了 6 秒，2.5 秒的循环表走完两轮多</text>
  <text x="390" y="360" text-anchor="middle" font-size="12" fill="#4a463f">just_finished() 仍只答一次“真”——补几支箭要问 times_finished_this_tick()</text>

  <text x="380" y="408" text-anchor="middle" font-size="12" fill="#7a7468">Timer 不挂在任何调度上：不喂不走，喂谁的 delta 就过谁的日子</text>
</svg>
