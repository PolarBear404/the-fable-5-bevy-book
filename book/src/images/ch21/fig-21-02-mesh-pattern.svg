<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-d21p" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#7a7468"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#f7f5f0"/>

  <text x="380" y="34" text-anchor="middle" font-size="16" fill="#4a463f" font-weight="bold">同一个模式：形状 + 皮相，各发一张提货单</text>

  <!-- 连线先画，盒子后画——线从 3D 盒“背后”穿过 -->
  <path d="M152,158 L152,330" stroke="#7a7468" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-d21p)"/>
  <path d="M423,158 L423,330" stroke="#7a7468" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-d21p)"/>

  <!-- 2D 行 -->
  <text x="52" y="86" font-size="13" fill="#7a7468" font-weight="bold">2D（第 15 章）</text>
  <rect x="52" y="100" width="200" height="58" rx="10" fill="#ffffff" stroke="#274a91" stroke-width="2"/>
  <text x="152" y="124" text-anchor="middle" font-size="13.5" fill="#274a91" font-weight="bold">Mesh2d</text>
  <text x="152" y="144" text-anchor="middle" font-size="11" fill="#7a7468">Handle&lt;Mesh&gt;</text>

  <text x="272" y="134" font-size="15" fill="#4a463f">+</text>

  <rect x="292" y="100" width="262" height="58" rx="10" fill="#ffffff" stroke="#274a91" stroke-width="2"/>
  <text x="423" y="124" text-anchor="middle" font-size="13.5" fill="#274a91" font-weight="bold">MeshMaterial2d&lt;ColorMaterial&gt;</text>
  <text x="423" y="144" text-anchor="middle" font-size="11" fill="#7a7468">不参与光照：给什么颜色画什么颜色</text>

  <rect x="586" y="100" width="122" height="58" rx="10" fill="#eef0f7" stroke="#274a91" stroke-width="1.5"/>
  <text x="647" y="124" text-anchor="middle" font-size="12" fill="#274a91">剪纸道具</text>
  <text x="647" y="144" text-anchor="middle" font-size="11" fill="#7a7468">不点灯也亮</text>

  <!-- 3D 行 -->
  <text x="52" y="206" font-size="13" fill="#7a7468" font-weight="bold">3D（本章）</text>
  <rect x="52" y="220" width="200" height="58" rx="10" fill="#ffffff" stroke="#c05a2e" stroke-width="2"/>
  <text x="152" y="244" text-anchor="middle" font-size="13.5" fill="#c05a2e" font-weight="bold">Mesh3d</text>
  <text x="152" y="264" text-anchor="middle" font-size="11" fill="#7a7468">Handle&lt;Mesh&gt;——同一种资产</text>

  <text x="272" y="254" font-size="15" fill="#4a463f">+</text>

  <rect x="292" y="220" width="262" height="58" rx="10" fill="#ffffff" stroke="#c05a2e" stroke-width="2"/>
  <text x="423" y="244" text-anchor="middle" font-size="13.5" fill="#c05a2e" font-weight="bold">MeshMaterial3d&lt;StandardMaterial&gt;</text>
  <text x="423" y="264" text-anchor="middle" font-size="11" fill="#7a7468">受光材质：亮度由灯和朝向算出来</text>

  <rect x="586" y="220" width="122" height="58" rx="10" fill="#fbeee6" stroke="#c05a2e" stroke-width="1.5"/>
  <text x="647" y="244" text-anchor="middle" font-size="12" fill="#c05a2e">立体坯子</text>
  <text x="647" y="264" text-anchor="middle" font-size="11" fill="#7a7468">还欠一盏灯</text>

  <!-- 货架 -->
  <rect x="52" y="334" width="200" height="62" rx="10" fill="#f6ecdd" stroke="#b8862e" stroke-width="1.5"/>
  <text x="152" y="358" text-anchor="middle" font-size="12.5" fill="#7a5414" font-weight="bold">Assets&lt;Mesh&gt;</text>
  <text x="152" y="378" text-anchor="middle" font-size="11" fill="#4a463f">同一个货架，2D/3D 通用</text>

  <rect x="292" y="334" width="262" height="62" rx="10" fill="#f6ecdd" stroke="#b8862e" stroke-width="1.5"/>
  <text x="423" y="358" text-anchor="middle" font-size="12.5" fill="#7a5414" font-weight="bold">Assets&lt;ColorMaterial&gt;　Assets&lt;StandardMaterial&gt;</text>
  <text x="423" y="378" text-anchor="middle" font-size="11" fill="#4a463f">材质各管各的料架——类型不同，资产不通用</text>

  <text x="380" y="420" text-anchor="middle" font-size="12" fill="#7a7468">两对组件只差一个数字：手艺全部原样升维，新债只有“光”一笔</text>
</svg>
