<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-o21n" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#c05a2e"/>
    </marker>
    <marker id="arr-b21n" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#274a91"/>
    </marker>
    <linearGradient id="grad-21n" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5d6e67"/>
      <stop offset="0.5" stop-color="#9fb3aa"/>
      <stop offset="1" stop-color="#46554f"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#f7f5f0"/>

  <text x="380" y="34" text-anchor="middle" font-size="16" fill="#4a463f" font-weight="bold">法线：顶点对“我朝哪儿”的答复——亭盖剖面侧视</text>

  <!-- 灯 -->
  <circle cx="380" cy="84" r="14" fill="#f0c75e" stroke="#b8862e" stroke-width="2"/>
  <g stroke="#b8862e" stroke-width="1.6">
    <path d="M380,62 L380,52"/><path d="M402,68 L409,61"/><path d="M358,68 L351,61"/>
    <path d="M404,84 L414,84"/><path d="M356,84 L346,84"/>
  </g>
  <text x="380" y="122" text-anchor="middle" font-size="11.5" fill="#7a5414">同一盏灯</text>

  <!-- 左：按面法线 -->
  <text x="190" y="160" text-anchor="middle" font-size="13.5" fill="#4a463f" font-weight="bold">拆开顶点，按面给答案</text>
  <!-- 左坡（亮）右坡（暗） -->
  <path d="M70,330 L190,210 L190,330 Z" fill="#9fb3aa" stroke="#4a463f" stroke-width="2"/>
  <path d="M190,210 L310,330 L190,330 Z" fill="#50605a" stroke="#4a463f" stroke-width="2"/>
  <!-- 法线：每面一致，垂直于坡 -->
  <g stroke="#c05a2e" stroke-width="2">
    <path d="M115,285 L87,257" marker-end="url(#arr-o21n)"/>
    <path d="M145,255 L117,227" marker-end="url(#arr-o21n)"/>
    <path d="M235,255 L263,227" marker-end="url(#arr-o21n)"/>
    <path d="M265,285 L293,257" marker-end="url(#arr-o21n)"/>
  </g>
  <!-- 锥尖两份答案 -->
  <path d="M186,206 L158,178" stroke="#c05a2e" stroke-width="2" marker-end="url(#arr-o21n)"/>
  <path d="M194,206 L222,178" stroke="#c05a2e" stroke-width="2" marker-end="url(#arr-o21n)"/>
  <text x="146" y="170" text-anchor="end" font-size="10.5" fill="#c05a2e" stroke="#f7f5f0" stroke-width="3.5" paint-order="stroke">锥尖拆成两份，各答各的</text>
  <text x="190" y="368" text-anchor="middle" font-size="11.5" fill="#4a463f">一面之内答案相同 → 亮度一刀切</text>
  <text x="190" y="388" text-anchor="middle" font-size="11.5" fill="#7a7468">向光的坡整面亮，背光的坡整面暗</text>

  <!-- 右：共享顶点平滑法线 -->
  <text x="570" y="160" text-anchor="middle" font-size="13.5" fill="#4a463f" font-weight="bold">共用顶点，答案被折中</text>
  <path d="M450,330 L570,210 L690,330 Z" fill="url(#grad-21n)" stroke="#4a463f" stroke-width="2"/>
  <!-- 法线：角上斜，锥尖向上，坡中间插值 -->
  <g stroke="#274a91" stroke-width="2">
    <path d="M450,330 L424,316" marker-end="url(#arr-b21n)"/>
    <path d="M690,330 L716,316" marker-end="url(#arr-b21n)"/>
    <path d="M510,270 L492,238" marker-end="url(#arr-b21n)"/>
    <path d="M630,270 L648,238" marker-end="url(#arr-b21n)"/>
  </g>
  <path d="M570,206 L570,170" stroke="#274a91" stroke-width="2.4" marker-end="url(#arr-b21n)"/>
  <text x="570" y="160" text-anchor="middle" font-size="10.5" fill="#274a91" stroke="#f7f5f0" stroke-width="3.5" paint-order="stroke" opacity="0">.</text>
  <text x="640" y="196" text-anchor="middle" font-size="10.5" fill="#274a91" stroke="#f7f5f0" stroke-width="3.5" paint-order="stroke">锥尖只有一份答案：四坡平均=朝天</text>
  <text x="570" y="368" text-anchor="middle" font-size="11.5" fill="#4a463f">面内答案沿顶点插值 → 亮度连续渐变</text>
  <text x="570" y="388" text-anchor="middle" font-size="11.5" fill="#7a7468">棱没了，看着像一只馒头</text>

  <text x="380" y="418" text-anchor="middle" font-size="12" fill="#7a7468">受光多少 = 法线与灯方向的夹角说了算；逐像素的答案，由三角形三个角的法线插值而来</text>
</svg>
