<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-o21q" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#c05a2e"/>
    </marker>
    <marker id="arr-g21q" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#1d6b40"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#f7f5f0"/>

  <text x="380" y="34" text-anchor="middle" font-size="16" fill="#4a463f" font-weight="bold">一面方旗的两张清单：4 个顶点，2 个三角形</text>

  <!-- 左：顶点表 -->
  <rect x="40" y="64" width="208" height="170" rx="10" fill="#ffffff" stroke="#274a91" stroke-width="1.5"/>
  <text x="144" y="90" text-anchor="middle" font-size="13" fill="#274a91" font-weight="bold">顶点清单（POSITION）</text>
  <text x="60" y="118" font-size="12.5" fill="#4a463f" font-family="Consolas, monospace">0  [-0.7,  0.7, 0.0]</text>
  <text x="60" y="144" font-size="12.5" fill="#4a463f" font-family="Consolas, monospace">1  [ 0.7,  0.7, 0.0]</text>
  <text x="60" y="170" font-size="12.5" fill="#4a463f" font-family="Consolas, monospace">2  [ 0.7, -0.7, 0.0]</text>
  <text x="60" y="196" font-size="12.5" fill="#4a463f" font-family="Consolas, monospace">3  [-0.7, -0.7, 0.0]</text>
  <text x="144" y="222" text-anchor="middle" font-size="11" fill="#7a7468">行号就是编号，没写在数据里</text>

  <!-- 左下：索引表 -->
  <rect x="40" y="258" width="208" height="124" rx="10" fill="#ffffff" stroke="#274a91" stroke-width="1.5"/>
  <text x="144" y="284" text-anchor="middle" font-size="13" fill="#274a91" font-weight="bold">三角形清单（索引）</text>
  <text x="60" y="314" font-size="13" fill="#c05a2e" font-family="Consolas, monospace">0, 3, 2</text>
  <text x="128" y="314" font-size="11.5" fill="#7a7468">← 三个一组</text>
  <text x="60" y="342" font-size="13" fill="#1d6b40" font-family="Consolas, monospace">0, 2, 1</text>
  <text x="144" y="368" text-anchor="middle" font-size="11" fill="#7a7468">同一个顶点谁都可以再点名</text>

  <!-- 中：旗面几何 -->
  <g>
    <!-- 三角 A：0-3-2 -->
    <path d="M340,90 L340,330 L580,330 Z" fill="#fbeee6" stroke="none"/>
    <!-- 三角 B：0-2-1 -->
    <path d="M340,90 L580,330 L580,90 Z" fill="#e8f1ea" stroke="none"/>
    <path d="M340,90 L580,90 L580,330 L340,330 Z" fill="none" stroke="#4a463f" stroke-width="2"/>
    <path d="M340,90 L580,330" stroke="#4a463f" stroke-width="1.4" stroke-dasharray="6,4"/>

    <!-- 顶点标号 -->
    <circle cx="340" cy="90" r="13" fill="#274a91"/>
    <text x="340" y="95" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">0</text>
    <circle cx="580" cy="90" r="13" fill="#274a91"/>
    <text x="580" y="95" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">1</text>
    <circle cx="580" cy="330" r="13" fill="#274a91"/>
    <text x="580" y="335" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">2</text>
    <circle cx="340" cy="330" r="13" fill="#274a91"/>
    <text x="340" y="335" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">3</text>

    <!-- 缠绕箭头：A 逆时针 0→3→2 -->
    <path d="M372,136 C362,196 372,256 416,290" fill="none" stroke="#c05a2e" stroke-width="2.2" marker-end="url(#arr-o21q)"/>
    <text x="408" y="226" text-anchor="middle" font-size="12.5" fill="#c05a2e" font-weight="bold" stroke="#fbeee6" stroke-width="4" paint-order="stroke">0→3→2</text>

    <!-- 缠绕箭头：B 逆时针 0→2→1 -->
    <path d="M412,114 C476,160 530,214 548,266" fill="none" stroke="#1d6b40" stroke-width="2.2" marker-end="url(#arr-g21q)"/>
    <text x="508" y="178" text-anchor="middle" font-size="12.5" fill="#1d6b40" font-weight="bold" stroke="#e8f1ea" stroke-width="4" paint-order="stroke">0→2→1</text>
  </g>

  <!-- 右注 -->
  <rect x="618" y="120" width="112" height="180" rx="10" fill="#f6ecdd" stroke="#b8862e" stroke-width="1.5"/>
  <text x="674" y="146" text-anchor="middle" font-size="12.5" fill="#7a5414" font-weight="bold">缠绕顺序</text>
  <text x="674" y="172" text-anchor="middle" font-size="11.5" fill="#4a463f">从正面看</text>
  <text x="674" y="192" text-anchor="middle" font-size="11.5" fill="#4a463f">逆时针报数</text>
  <text x="674" y="218" text-anchor="middle" font-size="11.5" fill="#4a463f">= 这边是</text>
  <text x="674" y="238" text-anchor="middle" font-size="11.5" fill="#4a463f">正面</text>
  <text x="674" y="266" text-anchor="middle" font-size="11" fill="#7a7468">背面默认</text>
  <text x="674" y="284" text-anchor="middle" font-size="11" fill="#7a7468">不画（剔除）</text>

  <text x="380" y="416" text-anchor="middle" font-size="12" fill="#7a7468">两个三角形都点了 0 号和 2 号：索引的本事——顶点写一份，三角形随便用</text>
</svg>
